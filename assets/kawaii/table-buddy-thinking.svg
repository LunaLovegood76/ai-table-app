<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- 表格小精灵 - 思考状态（知识卡片展示时用） -->
  <!-- 思考气泡 -->
  <circle cx="98" cy="22" r="4" fill="#E8E8E8"/>
  <circle cx="105" cy="14" r="3" fill="#E0E0E0"/>
  <circle cx="110" cy="8" r="2" fill="#D8D8D8"/>
  <!-- 身体 -->
  <rect x="15" y="20" width="90" height="80" rx="18" ry="18" fill="url(#bodyGrad-think)"/>
  <!-- 身体高光 -->
  <rect x="20" y="22" width="80" height="30" rx="14" ry="14" fill="rgba(255,255,255,0.15)"/>
  <!-- 表格线条装饰 -->
  <line x1="55" y1="38" x2="55" y2="82" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="58" x2="88" y2="58" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"/>
  <!-- 左眼 - 看向右上方 -->
  <ellipse cx="44" cy="50" rx="5" ry="5.5" fill="#1a1a2e"/>
  <ellipse cx="45.5" cy="48" rx="2" ry="2" fill="white"/>
  <!-- 右眼 - 看向右上方 -->
  <ellipse cx="76" cy="50" rx="5" ry="5.5" fill="#1a1a2e"/>
  <ellipse cx="77.5" cy="48" rx="2" ry="2" fill="white"/>
  <!-- 腮红 -->
  <ellipse cx="34" cy="58" rx="5" ry="3.5" fill="#FF6B8A" opacity="0.3"/>
  <ellipse cx="86" cy="58" rx="5" ry="3.5" fill="#FF6B8A" opacity="0.3"/>
  <!-- 嘴巴 - 思考中的小嘴 -->
  <ellipse cx="60" cy="68" rx="4" ry="3.5" fill="#1a1a2e"/>
  <!-- 小手 - 左手托腮 -->
  <ellipse cx="10" cy="56" rx="8" ry="6" fill="#1CB0F6" stroke="#0095D9" stroke-width="1" transform="rotate(15, 10, 56)"/>
  <!-- 小手 - 右 -->
  <ellipse cx="110" cy="65" rx="8" ry="6" fill="#1CB0F6" stroke="#0095D9" stroke-width="1"/>
  <!-- 小脚 -->
  <ellipse cx="42" cy="100" rx="10" ry="5" fill="#1CB0F6"/>
  <ellipse cx="78" cy="100" rx="10" ry="5" fill="#1CB0F6"/>
  <defs>
    <linearGradient id="bodyGrad-think" x1="60" y1="20" x2="60" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4DC9F6"/>
      <stop offset="100%" stop-color="#1CB0F6"/>
    </linearGradient>
  </defs>
</svg>
