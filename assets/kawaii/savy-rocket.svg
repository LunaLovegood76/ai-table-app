<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <style>
    @keyframes rocketShake { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    .rocket-shake { animation: rocketShake 0.15s ease-in-out infinite; }
  </style>
  <!-- 骑火箭鸭鸭 — 骑在火箭上飞行，兴奋表情 -->
  <defs>
    <linearGradient id="duckBodyRocket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
    <linearGradient id="rocketBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
  </defs>
  <!-- 火箭尾焰 -->
  <g>
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="0.25s" repeatCount="indefinite"/>
  <path d="M55 130 Q60 115 50 130 Q58 118 55 135 Q62 120 60 135" fill="#FF6B35" opacity="0.7"/>
  <path d="M65 128 Q70 112 62 128 Q68 115 65 132 Q72 118 70 132" fill="#FFC107" opacity="0.6"/>
  </g>
  <!-- 火箭 -->
  <path d="M50 65 L70 30 L90 65" fill="url(#rocketBody)" stroke="#42A5F5" stroke-width="2" stroke-linejoin="round"/>
  <rect x="50" y="65" width="40" height="50" rx="4" fill="url(#rocketBody)" stroke="#42A5F5" stroke-width="2"/>
  <!-- 火箭窗口 -->
  <circle cx="70" cy="80" r="10" fill="#E8F5E9" stroke="#42A5F5" stroke-width="1.5"/>
  <circle cx="70" cy="80" r="6" fill="#81C784" opacity="0.5"/>
  <!-- 火箭翅膀 -->
  <path d="M50 95 L35 115 L50 110" fill="#FF8A65" stroke="#E64A19" stroke-width="1.5"/>
  <path d="M90 95 L105 115 L90 110" fill="#FF8A65" stroke="#E64A19" stroke-width="1.5"/>
  <!-- 火箭底部 -->
  <rect x="55" y="115" width="30" height="8" rx="3" fill="#42A5F5" stroke="#1E88E5" stroke-width="1.5"/>
  <!-- 鸭鸭身体（骑在火箭上） -->
  <ellipse cx="70" cy="58" rx="18" ry="12" fill="url(#duckBodyRocket)" stroke="#D4A017" stroke-width="2"/>
  <!-- 双手抱火箭 -->
  <ellipse cx="48" cy="62" rx="7" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <ellipse cx="92" cy="62" rx="7" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 鸭鸭头 -->
  <circle cx="70" cy="32" r="22" fill="url(#duckBodyRocket)" stroke="#D4A017" stroke-width="2"/>
  <!-- 头顶白毛 -->
  <ellipse cx="70" cy="11" rx="3.5" ry="4.5" fill="white" stroke="#E0E0E0" stroke-width="0.8"/>
  <!-- 腮红 -->
  <circle cx="52" cy="37" r="7.5" fill="#FFB0C1" opacity="0.7"/>
  <circle cx="88" cy="37" r="7.5" fill="#FFB0C1" opacity="0.7"/>
  <!-- 眼镜 -->
  <circle cx="60" cy="30" r="9" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <circle cx="80" cy="30" r="9" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="69" y1="30" x2="71" y2="30" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="51" y1="30" x2="47" y2="28" stroke="#C8A850" stroke-width="1.2"/>
  <line x1="89" y1="30" x2="93" y2="28" stroke="#C8A850" stroke-width="1.2"/>
  <!-- 眼睛（兴奋大眼） -->
  <circle cx="60" cy="29" r="4" fill="#1a1a2e"/>
  <circle cx="80" cy="29" r="4" fill="#1a1a2e"/>
  <circle cx="62" cy="27.5" r="1.8" fill="white"/>
  <circle cx="82" cy="27.5" r="1.8" fill="white"/>
  <circle cx="59" cy="30.5" r="0.8" fill="white"/>
  <circle cx="79" cy="30.5" r="0.8" fill="white"/>
  <!-- 鸭嘴 — 兴奋张嘴 -->
  <ellipse cx="70" cy="40" rx="8" ry="5" fill="#FF8C42" stroke="#E07030" stroke-width="1.5"/>
  <path d="M64 40 Q70 46 76 40" stroke="#E07030" stroke-width="1.2" fill="none"/>
  <!-- 项圈 + 铃铛 -->
  <path d="M54 46 Q70 52 86 46" stroke="#FF8FAB" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="70" cy="50" r="3" fill="#C8A850" stroke="#A08030" stroke-width="1"/>
  <circle cx="70" cy="50" r="1.2" fill="#A08030"/>
  <!-- 速度线 -->
  <line x1="15" y1="40" x2="30" y2="45" stroke="#42A5F5" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="10" y1="55" x2="28" y2="58" stroke="#42A5F5" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="110" y1="38" x2="125" y2="42" stroke="#42A5F5" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- 小星星 -->
  <polygon points="18,18 20,12 22,18 16,15 24,15" fill="#FFC107">
    <animate attributeName="opacity" values="0;1;0" dur="1.2s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="125,20 127,16 129,20 125,18 129,18" fill="#FFC107" opacity="0.4"/>
</svg>
