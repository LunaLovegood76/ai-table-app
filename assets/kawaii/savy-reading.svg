<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <!-- 看书鸭鸭 — 坐在书堆上，双手捧打开的书阅读 -->
  <defs>
    <linearGradient id="duckBodyRead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>
  <!-- 底部书堆 — 两本叠放的书 -->
  <!-- 下面那本（绿色，更宽） -->
  <rect x="22" y="112" width="96" height="16" rx="3" fill="#A8E6CF" stroke="#66BB6A" stroke-width="1.5"/>
  <line x1="22" y1="120" x2="118" y2="120" stroke="#66BB6A" stroke-width="0.8" opacity="0.5"/>
  <!-- 上面那本（红色，稍窄） -->
  <rect x="28" y="98" width="84" height="14" rx="3" fill="#FF8A80" stroke="#E53935" stroke-width="1.5"/>
  <line x1="28" y1="105" x2="112" y2="105" stroke="#E53935" stroke-width="0.8" opacity="0.5"/>
  <!-- 书脊装饰 -->
  <line x1="26" y1="112" x2="26" y2="128" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="98" x2="32" y2="112" stroke="#C62828" stroke-width="2" stroke-linecap="round"/>
  <!-- 鸭鸭坐在书堆上 — 小脚悬空 -->
  <ellipse cx="52" cy="100" rx="8" ry="4" fill="#FFE566" stroke="#D4A017" stroke-width="1.2"/>
  <ellipse cx="88" cy="100" rx="8" ry="4" fill="#FFE566" stroke="#D4A017" stroke-width="1.2"/>
  <!-- 鸭鸭身体（坐姿） -->
  <ellipse cx="70" cy="82" rx="22" ry="16" fill="url(#duckBodyRead)" stroke="#D4A017" stroke-width="2"/>
  <!-- 鸭鸭头 -->
  <circle cx="70" cy="40" r="26" fill="url(#duckBodyRead)" stroke="#D4A017" stroke-width="2"/>
  <!-- 头顶白毛 -->
  <ellipse cx="70" cy="15" rx="4" ry="5" fill="white" stroke="#E0E0E0" stroke-width="0.8"/>
  <!-- 腮红 -->
  <circle cx="48" cy="46" r="9" fill="#FFB0C1" opacity="0.7"/>
  <circle cx="92" cy="46" r="9" fill="#FFB0C1" opacity="0.7"/>
  <!-- 眼镜 -->
  <circle cx="58" cy="40" r="10" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <circle cx="82" cy="40" r="10" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="68" y1="40" x2="72" y2="40" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="48" y1="40" x2="43" y2="38" stroke="#C8A850" stroke-width="1.2"/>
  <line x1="92" y1="40" x2="97" y2="38" stroke="#C8A850" stroke-width="1.2"/>
  <!-- 眼睛（低头看书，瞳孔偏下） -->
  <circle cx="58" cy="42" r="3.8" fill="#1a1a2e"/>
  <circle cx="82" cy="42" r="3.8" fill="#1a1a2e"/>
  <circle cx="59.5" cy="41" r="1.5" fill="white"/>
  <circle cx="83.5" cy="41" r="1.5" fill="white"/>
  <!-- 鸭嘴 — 专注微抿 -->
  <ellipse cx="70" cy="52" rx="9" ry="4.5" fill="#FF8C42" stroke="#E07030" stroke-width="1.5"/>
  <line x1="63" y1="52.5" x2="77" y2="52.5" stroke="#E07030" stroke-width="1"/>
  <!-- 项圈 + 铃铛 -->
  <path d="M50 58 Q70 66 90 58" stroke="#FF8FAB" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="70" cy="63" r="3.5" fill="#C8A850" stroke="#A08030" stroke-width="1"/>
  <circle cx="70" cy="63" r="1.5" fill="#A08030"/>
  <!-- 双手捧书 -->
  <ellipse cx="42" cy="72" rx="7" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <ellipse cx="98" cy="72" rx="7" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 手中打开的书 -->
  <g>
    <!-- 左页 -->
    <path d="M46 64 Q56 60 68 64 L68 82 Q56 78 46 82 Z" fill="#FFCCBC" stroke="#E64A19" stroke-width="1.5"/>
    <!-- 右页 -->
    <path d="M72 64 Q82 60 94 64 L94 82 Q82 78 72 82 Z" fill="#FFCCBC" stroke="#E64A19" stroke-width="1.5"/>
    <!-- 书脊 -->
    <line x1="70" y1="62" x2="70" y2="82" stroke="#BF360C" stroke-width="2"/>
    <!-- 左页文字线 -->
    <path d="M50 69 Q58 67 65 69" stroke="#E0A090" stroke-width="0.8" fill="none"/>
    <path d="M50 73 Q57 71 64 73" stroke="#E0A090" stroke-width="0.8" fill="none"/>
    <path d="M50 77 Q58 75 65 77" stroke="#E0A090" stroke-width="0.8" fill="none"/>
    <!-- 右页文字线 -->
    <path d="M75 69 Q82 67 90 69" stroke="#E0A090" stroke-width="0.8" fill="none"/>
    <path d="M75 73 Q83 71 91 73" stroke="#E0A090" stroke-width="0.8" fill="none"/>
    <path d="M75 77 Q82 75 90 77" stroke="#E0A090" stroke-width="0.8" fill="none"/>
    <!-- 翻页动效 — 右上角翻起的页 -->
    <path d="M94 64 L94 72 Q90 68 86 64 Z" fill="#FFE0B2" stroke="#E64A19" stroke-width="0.8">
      <animateTransform attributeName="transform" type="rotate" values="0 94 64;-15 94 64;0 94 64" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- 小星星装饰 -->
  <polygon points="18,24 20,18 22,24 16,21 24,21" fill="#42A5F5" opacity="0.35">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="122,20 123,16 124,20 120,18 126,18" fill="#FFC107" opacity="0.4">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2.5s" repeatCount="indefinite"/>
  </polygon>
</svg>
