<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Savy 大佬表情 — 墨镜+金链子+叼牙签+抱臂 -->
  <defs>
    <linearGradient id="savyBodyBoss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>
  <!-- 身后光芒 -->
  <g opacity="0.15">
    <line x1="60" y1="46" x2="60" y2="4" stroke="#FFC107" stroke-width="3"/>
    <line x1="60" y1="46" x2="30" y2="12" stroke="#FFC107" stroke-width="2.5"/>
    <line x1="60" y1="46" x2="90" y2="12" stroke="#FFC107" stroke-width="2.5"/>
    <line x1="60" y1="46" x2="14" y2="30" stroke="#FFC107" stroke-width="2"/>
    <line x1="60" y1="46" x2="106" y2="30" stroke="#FFC107" stroke-width="2"/>
    <line x1="60" y1="46" x2="8" y2="52" stroke="#FFC107" stroke-width="1.5"/>
    <line x1="60" y1="46" x2="112" y2="52" stroke="#FFC107" stroke-width="1.5"/>
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="2s" repeatCount="indefinite"/>
  </g>
  <!-- 身体 -->
  <ellipse cx="60" cy="84" rx="22" ry="16" fill="url(#savyBodyBoss)" stroke="#D4A017" stroke-width="2"/>
  <!-- 金链子 -->
  <path d="M44 70 Q52 80 60 78 Q68 80 76 70" stroke="#C8A850" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M48 73 Q54 82 60 80 Q66 82 72 73" stroke="#A08030" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 金链坠子 -->
  <circle cx="60" cy="82" r="4" fill="#C8A850" stroke="#A08030" stroke-width="1"/>
  <text x="57" y="84.5" font-size="5" font-weight="800" fill="#A08030" font-family="sans-serif">$</text>
  <!-- 小脚（霸气叉开） -->
  <ellipse cx="45" cy="102" rx="9" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5" transform="rotate(-8,45,102)"/>
  <ellipse cx="75" cy="102" rx="9" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5" transform="rotate(8,75,102)"/>
  <!-- 头 -->
  <circle cx="60" cy="46" r="28" fill="url(#savyBodyBoss)" stroke="#D4A017" stroke-width="2"/>
  <!-- 头顶白毛（向后倒，帅气） -->
  <ellipse cx="62" cy="19" rx="4" ry="5" fill="white" stroke="#E0E0E0" stroke-width="0.8" transform="rotate(15,62,19)"/>
  <!-- 腮红（淡一点，酷） -->
  <circle cx="36" cy="52" r="8" fill="#FFB0C1" opacity="0.5"/>
  <circle cx="84" cy="52" r="8" fill="#FFB0C1" opacity="0.5"/>
  <!-- 墨镜（比 cool 更大更方） -->
  <rect x="34" y="36" width="23" height="16" rx="3" fill="#1a1a2e" stroke="#111" stroke-width="1.5"/>
  <rect x="63" y="36" width="23" height="16" rx="3" fill="#1a1a2e" stroke="#111" stroke-width="1.5"/>
  <line x1="57" y1="44" x2="63" y2="44" stroke="#111" stroke-width="2"/>
  <line x1="34" y1="42" x2="28" y2="38" stroke="#111" stroke-width="1.5"/>
  <line x1="86" y1="42" x2="92" y2="38" stroke="#111" stroke-width="1.5"/>
  <!-- 墨镜反光 -->
  <rect x="38" y="38" width="8" height="3" rx="1.5" fill="white" opacity="0.2" transform="rotate(-10,42,39)"/>
  <rect x="67" y="38" width="8" height="3" rx="1.5" fill="white" opacity="0.2" transform="rotate(-10,71,39)"/>
  <!-- 鸭嘴 — 嘴角上扬+叼牙签 -->
  <ellipse cx="60" cy="57" rx="10" ry="5" fill="#FF8C42" stroke="#E07030" stroke-width="1.5"/>
  <path d="M52 56 Q60 62 68 56" stroke="#E07030" stroke-width="1.2" fill="none"/>
  <!-- 牙签 -->
  <line x1="68" y1="56" x2="88" y2="48" stroke="#C8A850" stroke-width="1.8" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" values="0 68 56;3 68 56;0 68 56;-2 68 56;0 68 56" dur="3s" repeatCount="indefinite"/>
  </line>
  <!-- 项圈（被金链子遮住大部分，只露一点） -->
  <path d="M42 66 Q50 70 54 68" stroke="#FF8FAB" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M66 68 Q70 70 78 66" stroke="#FF8FAB" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- 双臂抱胸 -->
  <path d="M38 74 L44 80" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
  <path d="M82 74 L76 80" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="50" cy="82" rx="7" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <ellipse cx="70" cy="82" rx="7" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
</svg>