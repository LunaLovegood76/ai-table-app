<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <!-- 眺望远方鸭鸭 — 朝右看，手搭额头遮阳，身体微侧 -->
  <defs>
    <linearGradient id="duckBodyGaze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>
  <!-- 远方的小山丘 -->
  <path d="M90 130 Q105 105 130 130" fill="#C8E6C9" stroke="#81C784" stroke-width="1.5" opacity="0.5"/>
  <path d="M105 130 Q118 112 140 130" fill="#A5D6A7" stroke="#66BB6A" stroke-width="1.5" opacity="0.4"/>
  <!-- 太阳 -->
  <circle cx="125" cy="22" r="12" fill="#FFC107" opacity="0.6">
    <animate attributeName="r" values="11;15;11" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <line x1="125" y1="6" x2="125" y2="2" stroke="#FFC107" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="139" y1="22" x2="140" y2="22" stroke="#FFC107" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="135" y1="12" x2="138" y2="9" stroke="#FFC107" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="135" y1="32" x2="138" y2="35" stroke="#FFC107" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- 小脚 -->
  <ellipse cx="55" cy="111" rx="10" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <ellipse cx="80" cy="111" rx="10" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 鸭鸭身体（微侧向右） -->
  <ellipse cx="68" cy="89" rx="24" ry="20" fill="url(#duckBodyGaze)" stroke="#D4A017" stroke-width="2"/>
  <!-- 左手自然下垂 -->
  <ellipse cx="40" cy="89" rx="8" ry="6" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 鸭鸭头（微转向右） -->
  <circle cx="72" cy="50" r="27" fill="url(#duckBodyGaze)" stroke="#D4A017" stroke-width="2"/>
  <!-- 头顶白毛 -->
  <ellipse cx="72" cy="24" rx="4" ry="5" fill="white" stroke="#E0E0E0" stroke-width="0.8"/>
  <!-- 右手搭额头遮阳 -->
  <ellipse cx="100" cy="42" rx="10" ry="6" fill="#FFE566" stroke="#D4A017" stroke-width="1.5" transform="rotate(-20 100 42)"/>
  <path d="M92 78 Q100 65 102 45" stroke="#D4A017" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 腮红 -->
  <circle cx="52" cy="56" r="9" fill="#FFB0C1" opacity="0.7"/>
  <circle cx="96" cy="54" r="9" fill="#FFB0C1" opacity="0.7"/>
  <!-- 眼镜 -->
  <circle cx="62" cy="48" r="10" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <circle cx="84" cy="47" r="10" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="72" y1="48" x2="74" y2="47" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="52" y1="48" x2="47" y2="46" stroke="#C8A850" stroke-width="1.2"/>
  <line x1="94" y1="47" x2="99" y2="45" stroke="#C8A850" stroke-width="1.2"/>
  <!-- 眼睛（朝右看，瞳孔偏右） -->
  <circle cx="64" cy="47" r="3.8" fill="#1a1a2e"/>
  <circle cx="86" cy="46" r="3.8" fill="#1a1a2e"/>
  <circle cx="65.5" cy="46" r="1.5" fill="white"/>
  <circle cx="87.5" cy="45" r="1.5" fill="white"/>
  <!-- 鸭嘴（微侧） -->
  <ellipse cx="76" cy="60" rx="10" ry="5" fill="#FF8C42" stroke="#E07030" stroke-width="1.5" transform="rotate(5 76 60)"/>
  <line x1="68" y1="60" x2="84" y2="60" stroke="#E07030" stroke-width="1"/>
  <!-- 项圈 + 铃铛 -->
  <path d="M50 66 Q72 74 94 66" stroke="#FF8FAB" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="72" cy="71" r="3.5" fill="#C8A850" stroke="#A08030" stroke-width="1"/>
  <circle cx="72" cy="71" r="1.5" fill="#A08030"/>
  <!-- 远方飞鸟 -->
  <g>
    <path d="M108 40 Q110 38 112 40" stroke="#888" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;-50,-12;-100,-8" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
  </g>
  <g>
    <path d="M116 35 Q118 33 120 35" stroke="#888" stroke-width="1" fill="none" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;-40,-10;-80,-6" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;1;0" dur="5s" repeatCount="indefinite"/>
  </g>
</svg>
