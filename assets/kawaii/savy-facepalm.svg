<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Savy 无语表情 — 捂脸+偷看+省略号 -->
  <defs>
    <linearGradient id="savyBodyFp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>
  <!-- 身体 -->
  <ellipse cx="60" cy="84" rx="22" ry="16" fill="url(#savyBodyFp)" stroke="#D4A017" stroke-width="2"/>
  <!-- 小脚 -->
  <ellipse cx="48" cy="102" rx="9" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <ellipse cx="72" cy="102" rx="9" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 头 -->
  <circle cx="60" cy="46" r="28" fill="url(#savyBodyFp)" stroke="#D4A017" stroke-width="2"/>
  <!-- 头顶白毛（微微耷拉） -->
  <ellipse cx="60" cy="19" rx="4" ry="5" fill="white" stroke="#E0E0E0" stroke-width="0.8" transform="rotate(-8,60,19)"/>
  <!-- 腮红 -->
  <circle cx="36" cy="54" r="9" fill="#FFB0C1" opacity="0.7"/>
  <circle cx="84" cy="54" r="9" fill="#FFB0C1" opacity="0.7"/>
  <!-- 眼镜 -->
  <circle cx="50" cy="44" r="11" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <circle cx="70" cy="44" r="11" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="61" y1="44" x2="59" y2="44" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="39" y1="44" x2="34" y2="41" stroke="#C8A850" stroke-width="1.2"/>
  <line x1="81" y1="44" x2="86" y2="41" stroke="#C8A850" stroke-width="1.2"/>
  <!-- 眼睛 — 左眼从指缝偷看（半睁），右眼被手挡住 -->
  <!-- 左眼（半睁偷看） -->
  <path d="M45 44 Q50 40 55 44" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="50" cy="44" r="2" fill="#1a1a2e"/>
  <!-- 右眼被手挡住，不画 -->
  <!-- 眉毛 — 无奈下垂 -->
  <path d="M42 37 Q47 36 55 38" stroke="#D4A017" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M65 38 Q73 36 78 37" stroke="#D4A017" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 鸭嘴 — 抿嘴一条线（无语） -->
  <ellipse cx="60" cy="57" rx="9" ry="4" fill="#FF8C42" stroke="#E07030" stroke-width="1.5"/>
  <line x1="53" y1="57" x2="67" y2="57" stroke="#E07030" stroke-width="1.2"/>
  <!-- 项圈 + 铃铛 -->
  <path d="M42 66 Q60 74 78 66" stroke="#FF8FAB" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="60" cy="71" r="3" fill="#C8A850" stroke="#A08030" stroke-width="1"/>
  <circle cx="60" cy="71" r="1.2" fill="#A08030"/>
  <!-- 右手 — 捂脸（遮住右半边脸） -->
  <path d="M82 72 L76 50" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="74" cy="46" rx="10" ry="8" fill="#FFE566" stroke="#D4A017" stroke-width="1.5" opacity="0.9"/>
  <!-- 手指缝隙线条 -->
  <line x1="70" y1="42" x2="70" y2="50" stroke="#D4A017" stroke-width="1" opacity="0.6"/>
  <line x1="74" y1="41" x2="74" y2="51" stroke="#D4A017" stroke-width="1" opacity="0.6"/>
  <line x1="78" y1="42" x2="78" y2="50" stroke="#D4A017" stroke-width="1" opacity="0.6"/>
  <!-- 左手 — 自然下垂 -->
  <path d="M38 74 L26 84" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="24" cy="86" rx="6" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 头顶省略号（浮动） -->
  <g>
    <circle cx="42" cy="16" r="2.5" fill="#B0BEC5"/>
    <circle cx="52" cy="14" r="2.5" fill="#B0BEC5"/>
    <circle cx="62" cy="13" r="2.5" fill="#B0BEC5"/>
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </g>
</svg>