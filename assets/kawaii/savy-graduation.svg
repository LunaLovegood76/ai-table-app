<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130" width="120" height="130">
  <!-- Savy 毕业表情 — 学士帽+毕业证书+骄傲笑 -->
  <defs>
    <linearGradient id="savyBodyGr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>
  <!-- 身体 -->
  <ellipse cx="60" cy="86" rx="22" ry="16" fill="url(#savyBodyGr)" stroke="#D4A017" stroke-width="2"/>
  <!-- 小脚 -->
  <ellipse cx="47" cy="104" rx="9" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <ellipse cx="73" cy="104" rx="9" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 头 -->
  <circle cx="60" cy="48" r="28" fill="url(#savyBodyGr)" stroke="#D4A017" stroke-width="2"/>
  <!-- 学士帽 -->
  <!-- 帽顶（菱形板） -->
  <polygon points="60,10 95,22 60,30 25,22" fill="#2a2a3e" stroke="#1a1a2e" stroke-width="1.5"/>
  <!-- 帽身 -->
  <rect x="38" y="22" width="44" height="10" rx="2" fill="#2a2a3e" stroke="#1a1a2e" stroke-width="1"/>
  <!-- 帽穗（从右侧垂下） -->
  <line x1="60" y1="10" x2="60" y2="14" stroke="#C8A850" stroke-width="1.5"/>
  <circle cx="60" cy="14" r="2" fill="#C8A850"/>
  <path d="M60 14 Q68 14 72 8 Q76 2 80 6" stroke="#C8A850" stroke-width="1.5" fill="none" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" values="0 60 14;3 60 14;0 60 14;-2 60 14;0 60 14" dur="2s" repeatCount="indefinite"/>
  </path>
  <circle cx="80" cy="6" r="3" fill="#C8A850" stroke="#A08030" stroke-width="1">
    <animateTransform attributeName="transform" type="rotate" values="0 60 14;3 60 14;0 60 14;-2 60 14;0 60 14" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- 腮红 -->
  <circle cx="36" cy="54" r="9" fill="#FFB0C1" opacity="0.75"/>
  <circle cx="84" cy="54" r="9" fill="#FFB0C1" opacity="0.75"/>
  <!-- 眼镜 -->
  <circle cx="50" cy="46" r="11" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <circle cx="70" cy="46" r="11" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="61" y1="46" x2="59" y2="46" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="39" y1="46" x2="34" y2="43" stroke="#C8A850" stroke-width="1.2"/>
  <line x1="81" y1="46" x2="86" y2="43" stroke="#C8A850" stroke-width="1.2"/>
  <!-- 眼睛 — 眯眼骄傲笑 -->
  <path d="M44 44 Q50 39 56 44" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M64 44 Q70 39 76 44" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- 鸭嘴 — 得意大笑 -->
  <ellipse cx="60" cy="58" rx="10" ry="6" fill="#FF8C42" stroke="#E07030" stroke-width="1.5"/>
  <path d="M52 57 Q60 65 68 57" stroke="#E07030" stroke-width="1.2" fill="#E07030" opacity="0.3"/>
  <!-- 项圈 + 铃铛 -->
  <path d="M42 68 Q60 76 78 68" stroke="#FF8FAB" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="60" cy="73" r="3" fill="#C8A850" stroke="#A08030" stroke-width="1"/>
  <circle cx="60" cy="73" r="1.2" fill="#A08030"/>
  <!-- 左手 — 举起毕业证书卷轴 -->
  <path d="M38 76 L22 56" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="20" cy="54" rx="6" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 卷轴 -->
  <rect x="6" y="40" width="18" height="12" rx="2" fill="#FFF8E1" stroke="#C8A850" stroke-width="1.2"/>
  <line x1="10" y1="44" x2="20" y2="44" stroke="#D4A017" stroke-width="0.8"/>
  <line x1="10" y1="47" x2="18" y2="47" stroke="#D4A017" stroke-width="0.8"/>
  <circle cx="6" cy="46" r="2.5" fill="#C8A850" stroke="#A08030" stroke-width="0.8"/>
  <circle cx="24" cy="46" r="2.5" fill="#C8A850" stroke="#A08030" stroke-width="0.8"/>
  <!-- 红色蜡封 -->
  <circle cx="15" cy="50" r="2" fill="#FF4B4B"/>
  <!-- 右手 — 挥手庆祝 -->
  <g>
    <path d="M82 74 L96 58" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="98" cy="56" rx="6" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
    <animateTransform attributeName="transform" type="rotate" values="-5 82 74;8 82 74;-5 82 74" dur="0.8s" repeatCount="indefinite"/>
  </g>
  <!-- 彩纸飘落 -->
  <rect x="100" y="30" width="4" height="3" rx="1" fill="#FF4B4B">
    <animate attributeName="y" values="30;125" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.8;0" dur="2.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="0 102 31;360 102 125" dur="2.5s" repeatCount="indefinite" additive="replace"/>
  </rect>
  <rect x="108" y="20" width="3" height="3" rx="1" fill="#1CB0F6">
    <animate attributeName="y" values="20;125" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.7;0" dur="3s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="20 109 21;380 109 125" dur="3s" repeatCount="indefinite" additive="replace"/>
  </rect>
  <rect x="4" y="25" width="4" height="3" rx="1" fill="#58CC02">
    <animate attributeName="y" values="25;125" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.7;0" dur="2.8s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="-15 6 26;-375 6 125" dur="2.8s" repeatCount="indefinite" additive="replace"/>
  </rect>
</svg>