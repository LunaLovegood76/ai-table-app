<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Savy 强颜欢笑表情 — 嘴角上扬但眼含泪+竖大拇指+乌云彩虹 -->
  <defs>
    <linearGradient id="savyBodyPf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>
  <!-- 头顶乌云 -->
  <g>
    <ellipse cx="30" cy="14" rx="12" ry="7" fill="#90A4AE" opacity="0.5"/>
    <ellipse cx="40" cy="12" rx="9" ry="6" fill="#90A4AE" opacity="0.45"/>
    <ellipse cx="22" cy="12" rx="8" ry="5" fill="#90A4AE" opacity="0.4"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;3,0;0,0" dur="3s" repeatCount="indefinite"/>
  </g>
  <!-- 小彩虹（从乌云后面露出） -->
  <path d="M42 16 Q56 -2 70 16" stroke="#FF4B4B" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M44 16 Q56 0 68 16" stroke="#FFC107" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M46 16 Q56 2 66 16" stroke="#58CC02" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M48 16 Q56 4 64 16" stroke="#1CB0F6" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- 身体 -->
  <ellipse cx="60" cy="84" rx="22" ry="16" fill="url(#savyBodyPf)" stroke="#D4A017" stroke-width="2"/>
  <!-- 小脚 -->
  <ellipse cx="48" cy="102" rx="9" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <ellipse cx="72" cy="102" rx="9" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 头 -->
  <circle cx="60" cy="46" r="28" fill="url(#savyBodyPf)" stroke="#D4A017" stroke-width="2"/>
  <!-- 头顶白毛 -->
  <ellipse cx="60" cy="19" rx="4" ry="5" fill="white" stroke="#E0E0E0" stroke-width="0.8"/>
  <!-- 腮红（偏红，强忍） -->
  <circle cx="36" cy="54" r="9" fill="#FFB0C1" opacity="0.8"/>
  <circle cx="84" cy="54" r="9" fill="#FFB0C1" opacity="0.8"/>
  <!-- 眼镜 -->
  <circle cx="50" cy="44" r="11" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <circle cx="70" cy="44" r="11" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="61" y1="44" x2="59" y2="44" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="39" y1="44" x2="34" y2="41" stroke="#C8A850" stroke-width="1.2"/>
  <line x1="81" y1="44" x2="86" y2="41" stroke="#C8A850" stroke-width="1.2"/>
  <!-- 眼睛 — 笑着但含泪（眯眼弧线+泪珠） -->
  <path d="M44 43 Q50 38 56 43" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M64 43 Q70 38 76 43" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- 泪珠（从眯眼角滑落） -->
  <ellipse cx="56" cy="46" rx="2" ry="3" fill="#87CEEB" opacity="0.7">
    <animate attributeName="cy" values="46;56;46" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="76" cy="47" rx="1.8" ry="2.5" fill="#87CEEB" opacity="0.6">
    <animate attributeName="cy" values="47;55;47" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" dur="3.5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- 鸭嘴 — 强行微笑 -->
  <ellipse cx="60" cy="57" rx="10" ry="5" fill="#FF8C42" stroke="#E07030" stroke-width="1.5"/>
  <path d="M52 56 Q60 62 68 56" stroke="#E07030" stroke-width="1.2" fill="none"/>
  <!-- 嘴角抽搐线 -->
  <path d="M68 56 Q70 55 71 56" stroke="#E07030" stroke-width="1" fill="none">
    <animate attributeName="d" values="M68 56 Q70 55 71 56;M68 56 Q70 54 71 55;M68 56 Q70 55 71 56" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <!-- 项圈 + 铃铛 -->
  <path d="M42 66 Q60 74 78 66" stroke="#FF8FAB" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="60" cy="71" r="3" fill="#C8A850" stroke="#A08030" stroke-width="1"/>
  <circle cx="60" cy="71" r="1.2" fill="#A08030"/>
  <!-- 左手 — 自然下垂 -->
  <path d="M38 74 L26 84" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="24" cy="86" rx="6" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 右手 — 竖大拇指（强撑） -->
  <path d="M82 72 L96 62" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="98" cy="60" rx="6" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <path d="M97 56 L96 50" stroke="#D4A017" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="96" cy="49" r="2.5" fill="#FFE566" stroke="#D4A017" stroke-width="1"/>
</svg>