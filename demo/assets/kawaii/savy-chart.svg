<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <!-- 看图表鸭鸭 — 站在上升柱状图旁，指着图表，自信满满 -->
  <defs>
    <linearGradient id="duckBodyChart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>
  <!-- 柱状图 -->
  <rect x="8" y="105" width="14" height="25" rx="3" fill="#C8E6C9" stroke="#66BB6A" stroke-width="1.5"/>
  <rect x="26" y="90" width="14" height="40" rx="3" fill="#A5D6A7" stroke="#4CAF50" stroke-width="1.5"/>
  <rect x="44" y="72" width="14" height="58" rx="3" fill="#81C784" stroke="#388E3C" stroke-width="1.5"/>
  <!-- 上升箭头 -->
  <path d="M15 108 L33 93 L51 75" stroke="#FF6B35" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="51,70 56,78 47,78" fill="#FF6B35">
    <animate attributeName="opacity" values="1;0.1;1" dur="1.5s" repeatCount="indefinite"/>
  </polygon>
  <!-- 小脚 -->
  <ellipse cx="85" cy="115" rx="10" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <ellipse cx="108" cy="115" rx="10" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 鸭鸭身体 -->
  <ellipse cx="96" cy="93" rx="22" ry="20" fill="url(#duckBodyChart)" stroke="#D4A017" stroke-width="2"/>
  <!-- 左手指向图表 -->
  <path d="M74 78 L58 72" stroke="#D4A017" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="58" cy="72" rx="5" ry="4" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 右手叉腰 -->
  <ellipse cx="118" cy="86" rx="8" ry="6" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 鸭鸭头 -->
  <circle cx="96" cy="55" r="26" fill="url(#duckBodyChart)" stroke="#D4A017" stroke-width="2"/>
  <!-- 头顶白毛 -->
  <ellipse cx="96" cy="30" rx="4" ry="5" fill="white" stroke="#E0E0E0" stroke-width="0.8"/>
  <!-- 腮红 -->
  <circle cx="74" cy="61" r="9" fill="#FFB0C1" opacity="0.7"/>
  <circle cx="118" cy="61" r="9" fill="#FFB0C1" opacity="0.7"/>
  <!-- 眼镜 -->
  <circle cx="86" cy="53" r="10" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <circle cx="106" cy="53" r="10" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="96" y1="53" x2="96" y2="53" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="76" y1="53" x2="71" y2="50" stroke="#C8A850" stroke-width="1.2"/>
  <line x1="116" y1="53" x2="121" y2="50" stroke="#C8A850" stroke-width="1.2"/>
  <!-- 眼睛（自信看向图表，瞳孔偏左） -->
  <circle cx="85" cy="52" r="3.8" fill="#1a1a2e"/>
  <circle cx="105" cy="52" r="3.8" fill="#1a1a2e"/>
  <circle cx="83.5" cy="51" r="1.5" fill="white"/>
  <circle cx="103.5" cy="51" r="1.5" fill="white"/>
  <!-- 鸭嘴 — 自信微笑 -->
  <ellipse cx="96" cy="65" rx="9" ry="5" fill="#FF8C42" stroke="#E07030" stroke-width="1.5"/>
  <path d="M89 65 Q96 70 103 65" stroke="#E07030" stroke-width="1.2" fill="none"/>
  <!-- 项圈 + 铃铛 -->
  <path d="M76 72 Q96 80 116 72" stroke="#FF8FAB" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="96" cy="77" r="3.5" fill="#C8A850" stroke="#A08030" stroke-width="1"/>
  <circle cx="96" cy="77" r="1.5" fill="#A08030"/>
  <!-- 数据点装饰 -->
  <circle cx="15" cy="105" r="3" fill="#FFC107">
    <animate attributeName="r" values="2;6;2" dur="2s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="33" cy="90" r="3" fill="#FFC107">
    <animate attributeName="r" values="2;6;2" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="51" cy="72" r="3" fill="#FF6B35">
    <animate attributeName="r" values="2;7;2" dur="2s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>
</svg>
