<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <!-- 举奖杯鸭鸭 — 双手高举金色奖杯，得意洋洋 -->
  <defs>
    <linearGradient id="duckBodyTrophy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
    <linearGradient id="trophyGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
  </defs>
  <!-- 奖杯 -->
  <rect x="56" y="2" width="28" height="6" rx="3" fill="url(#trophyGold)" stroke="#B8860B" stroke-width="1.2"/>
  <path d="M58 8 L54 28 L86 28 L82 8" fill="url(#trophyGold)" stroke="#B8860B" stroke-width="1.5"/>
  <rect x="62" y="28" width="16" height="5" rx="2" fill="#DAA520" stroke="#B8860B" stroke-width="1"/>
  <rect x="58" y="33" width="24" height="4" rx="2" fill="#DAA520" stroke="#B8860B" stroke-width="1"/>
  <!-- 奖杯把手 -->
  <path d="M54 12 Q44 12 44 20 Q44 26 54 26" stroke="#B8860B" stroke-width="2" fill="none"/>
  <path d="M86 12 Q96 12 96 20 Q96 26 86 26" stroke="#B8860B" stroke-width="2" fill="none"/>
  <!-- 奖杯上的星 -->
  <polygon points="70,12 73,18 79,18 74,22 76,28 70,24 64,28 66,22 61,18 67,18" fill="#FFF9C4" opacity="0.8"/>
  <!-- 小脚 -->
  <ellipse cx="57" cy="124" rx="10" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <ellipse cx="83" cy="124" rx="10" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 鸭鸭身体 -->
  <ellipse cx="70" cy="102" rx="24" ry="20" fill="url(#duckBodyTrophy)" stroke="#D4A017" stroke-width="2"/>
  <!-- 双手高举（托奖杯） -->
  <path d="M46 80 Q42 55 55 38" stroke="#D4A017" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="55" cy="38" rx="7" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <path d="M94 80 Q98 55 85 38" stroke="#D4A017" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="85" cy="38" rx="7" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 鸭鸭头 -->
  <circle cx="70" cy="62" r="26" fill="url(#duckBodyTrophy)" stroke="#D4A017" stroke-width="2"/>
  <!-- 头顶白毛 -->
  <ellipse cx="70" cy="37" rx="4" ry="5" fill="white" stroke="#E0E0E0" stroke-width="0.8"/>
  <!-- 腮红 -->
  <circle cx="48" cy="68" r="9" fill="#FFB0C1" opacity="0.7"/>
  <circle cx="92" cy="68" r="9" fill="#FFB0C1" opacity="0.7"/>
  <!-- 眼镜 -->
  <circle cx="60" cy="60" r="10" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <circle cx="80" cy="60" r="10" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="70" y1="60" x2="70" y2="60" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="50" y1="60" x2="45" y2="57" stroke="#C8A850" stroke-width="1.2"/>
  <line x1="90" y1="60" x2="95" y2="57" stroke="#C8A850" stroke-width="1.2"/>
  <!-- 眼睛（得意眯眼笑） -->
  <path d="M54 59 Q60 55 66 59" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M74 59 Q80 55 86 59" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- 鸭嘴 — 得意大笑 -->
  <ellipse cx="70" cy="72" rx="10" ry="6" fill="#FF8C42" stroke="#E07030" stroke-width="1.5"/>
  <path d="M62 72 Q70 79 78 72" stroke="#E07030" stroke-width="1.2" fill="none"/>
  <!-- 项圈 + 铃铛 -->
  <path d="M50 80 Q70 88 90 80" stroke="#FF8FAB" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="70" cy="85" r="3.5" fill="#C8A850" stroke="#A08030" stroke-width="1"/>
  <circle cx="70" cy="85" r="1.5" fill="#A08030"/>
  <!-- 彩纸 -->
  <rect x="20" y="20" width="4" height="8" rx="1" fill="#FF4466" transform="rotate(25 22 24)">
    <animate attributeName="y" values="20;130" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.7;0" dur="3s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="25 22 24;385 22 124" dur="3s" repeatCount="indefinite" additive="replace"/>
  </rect>
  <rect x="115" y="30" width="4" height="8" rx="1" fill="#42A5F5" transform="rotate(-15 117 34)">
    <animate attributeName="y" values="30;130" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.6;0" dur="3.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="-15 117 34;-375 117 134" dur="3.5s" repeatCount="indefinite" additive="replace"/>
  </rect>
  <rect x="25" y="50" width="3" height="6" rx="1" fill="#FFC107" opacity="0.4" transform="rotate(40 26 53)"/>
  <rect x="110" y="55" width="3" height="6" rx="1" fill="#58CC02" opacity="0.4" transform="rotate(-30 111 58)"/>
  <!-- 小星星 -->
  <polygon points="15,15 17,9 19,15 13,12 21,12" fill="#FFC107">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="125,15 127,11 129,15 125,13 129,13" fill="#FFC107">
    <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite"/>
  </polygon>
</svg>
