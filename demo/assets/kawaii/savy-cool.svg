<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Savy 耍酷表情 — 墨镜+嘴角上扬+单手插兜 -->
  <defs>
    <linearGradient id="savyBodyCool" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>
  <!-- 身体（微微侧身） -->
  <ellipse cx="60" cy="84" rx="22" ry="16" fill="url(#savyBodyCool)" stroke="#D4A017" stroke-width="2"/>
  <!-- 小脚（交叉站立） -->
  <ellipse cx="50" cy="102" rx="9" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <ellipse cx="68" cy="101" rx="9" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5" transform="rotate(-5,68,101)"/>
  <!-- 头 -->
  <circle cx="60" cy="46" r="28" fill="url(#savyBodyCool)" stroke="#D4A017" stroke-width="2"/>
  <!-- 头顶白毛 -->
  <ellipse cx="60" cy="19" rx="4" ry="5" fill="white" stroke="#E0E0E0" stroke-width="0.8"/>
  <!-- 腮红 -->
  <circle cx="36" cy="52" r="9" fill="#FFB0C1" opacity="0.6"/>
  <circle cx="84" cy="52" r="9" fill="#FFB0C1" opacity="0.6"/>
  <!-- 墨镜（替换金框眼镜） -->
  <rect x="36" y="37" width="22" height="15" rx="4" fill="#2a2a3e" stroke="#1a1a2e" stroke-width="1.5"/>
  <rect x="62" y="37" width="22" height="15" rx="4" fill="#2a2a3e" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="58" y1="44" x2="62" y2="44" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="36" y1="42" x2="30" y2="39" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="84" y1="42" x2="90" y2="39" stroke="#1a1a2e" stroke-width="1.5"/>
  <!-- 墨镜反光 -->
  <rect x="40" y="39" width="6" height="3" rx="1.5" fill="white" opacity="0.25" transform="rotate(-15,43,40)"/>
  <rect x="66" y="39" width="6" height="3" rx="1.5" fill="white" opacity="0.25" transform="rotate(-15,69,40)"/>
  <!-- 鸭嘴 — 嘴角上扬（得意笑） -->
  <ellipse cx="60" cy="57" rx="10" ry="5" fill="#FF8C42" stroke="#E07030" stroke-width="1.5"/>
  <path d="M52 56 Q60 63 68 56" stroke="#E07030" stroke-width="1.2" fill="none"/>
  <path d="M68 56 Q70 54 71 55" stroke="#E07030" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- 项圈 + 铃铛 -->
  <path d="M42 66 Q60 74 78 66" stroke="#FF8FAB" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="60" cy="71" r="3" fill="#C8A850" stroke="#A08030" stroke-width="1"/>
  <circle cx="60" cy="71" r="1.2" fill="#A08030"/>
  <!-- 左手 — 插兜（贴在身体上） -->
  <path d="M40 76 L36 86" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="35" cy="88" rx="5" ry="4" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 右手 — 竖大拇指 -->
  <path d="M82 72 L96 62" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="98" cy="60" rx="6" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 大拇指 -->
  <path d="M97 56 L96 50" stroke="#D4A017" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="96" cy="49" r="2.5" fill="#FFE566" stroke="#D4A017" stroke-width="1"/>
  <!-- 闪光特效 -->
  <polygon points="14,24 16,19 18,24 13,21 19,21" fill="#FFC107">
    <animate attributeName="opacity" values="0;1;0" dur="1.2s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="104,20 106,15 108,20 103,17 109,17" fill="#FFC107">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="8,50 10,46 12,50 7,48 13,48" fill="#58CC02">
    <animate attributeName="opacity" values="0;0.8;0" dur="1.8s" repeatCount="indefinite"/>
  </polygon>
</svg>