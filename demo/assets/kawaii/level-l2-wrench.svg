<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <!-- L2 数据操作大师 — 玻尿酸鸭戴安全帽拿扳手修数据 -->
  <defs>
    <linearGradient id="duckBody2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>
  <!-- 工作台 -->
  <rect x="10" y="95" width="120" height="35" rx="8" fill="#E3F2FD" stroke="#1CB0F6" stroke-width="2"/>
  <!-- 工作台上的数据卡片 -->
  <rect x="18" y="102" width="35" height="22" rx="4" fill="white" stroke="#90CAF9" stroke-width="1.5"/>
  <rect x="23" y="107" width="24" height="3" rx="1" fill="#1CB0F6"/>
  <rect x="23" y="113" width="16" height="3" rx="1" fill="#BBDEFB"/>
  <!-- 齿轮（旋转） -->
  <g>
    <circle cx="100" cy="112" r="10" fill="none" stroke="#1CB0F6" stroke-width="2.5"/>
    <circle cx="100" cy="112" r="4" fill="#1CB0F6"/>
    <line x1="100" y1="101" x2="100" y2="104" stroke="#1CB0F6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="100" y1="120" x2="100" y2="123" stroke="#1CB0F6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="89" y1="112" x2="92" y2="112" stroke="#1CB0F6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="108" y1="112" x2="111" y2="112" stroke="#1CB0F6" stroke-width="2.5" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="rotate" values="0 100 112;360 100 112" dur="4s" repeatCount="indefinite"/>
  </g>
  <!-- 鸭鸭身体 -->
  <ellipse cx="65" cy="80" rx="24" ry="18" fill="url(#duckBody2)" stroke="#D4A017" stroke-width="2"/>
  <!-- 鸭鸭头 -->
  <circle cx="65" cy="45" r="26" fill="url(#duckBody2)" stroke="#D4A017" stroke-width="2"/>
  <!-- 头顶白毛 -->
  <ellipse cx="65" cy="20" rx="4" ry="5" fill="white" stroke="#E0E0E0" stroke-width="0.8"/>
  <!-- 安全帽 -->
  <path d="M39 38 Q39 16 65 14 Q91 16 91 38" fill="#1CB0F6" stroke="#0D8ECF" stroke-width="2"/>
  <rect x="36" y="36" width="58" height="6" rx="3" fill="#1CB0F6" stroke="#0D8ECF" stroke-width="1.5"/>
  <!-- 帽子上的灯 -->
  <circle cx="65" cy="16" r="4" fill="#FFC107" stroke="#FFA000" stroke-width="1">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;5.5;4" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="65" cy="15" r="1.5" fill="white" opacity="0.6"/>
  <!-- 腮红 -->
  <circle cx="43" cy="52" r="9" fill="#FFB0C1" opacity="0.7"/>
  <circle cx="87" cy="52" r="9" fill="#FFB0C1" opacity="0.7"/>
  <!-- 眼镜 -->
  <circle cx="55" cy="44" r="10" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <circle cx="75" cy="44" r="10" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="65" y1="44" x2="65" y2="44" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="45" y1="44" x2="40" y2="41" stroke="#C8A850" stroke-width="1.2"/>
  <line x1="85" y1="44" x2="90" y2="41" stroke="#C8A850" stroke-width="1.2"/>
  <!-- 眼睛 — 专注 -->
  <circle cx="55" cy="43" r="4" fill="#1a1a2e"/>
  <circle cx="75" cy="43" r="4" fill="#1a1a2e"/>
  <circle cx="57" cy="41.5" r="1.5" fill="white"/>
  <circle cx="77" cy="41.5" r="1.5" fill="white"/>
  <!-- 鸭嘴 -->
  <ellipse cx="65" cy="56" rx="10" ry="5" fill="#FF8C42" stroke="#E07030" stroke-width="1.5"/>
  <line x1="57" y1="56" x2="73" y2="56" stroke="#E07030" stroke-width="1"/>
  <!-- 项圈 + 铃铛 -->
  <path d="M44 64 Q65 72 86 64" stroke="#FF8FAB" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="65" cy="69" r="3.5" fill="#C8A850" stroke="#A08030" stroke-width="1"/>
  <circle cx="65" cy="69" r="1.5" fill="#A08030"/>
  <!-- 左手 -->
  <ellipse cx="36" cy="82" rx="8" ry="6" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 右手拿扳手 -->
  <g transform="translate(95, 60) rotate(25)">
    <rect x="-3" y="-22" width="6" height="28" rx="3" fill="#78909C" stroke="#546E7A" stroke-width="1.5"/>
    <circle cx="0" cy="-22" r="7" fill="none" stroke="#78909C" stroke-width="3.5"/>
  </g>
  <!-- 小脚 -->
  <ellipse cx="52" cy="98" rx="10" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <ellipse cx="78" cy="98" rx="10" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 螺丝装饰（旋转） -->
  <g>
    <circle cx="16" cy="18" r="4" fill="#BBDEFB" stroke="#1CB0F6" stroke-width="1.5"/>
    <line x1="13" y1="18" x2="19" y2="18" stroke="#1CB0F6" stroke-width="1.5"/>
    <line x1="16" y1="15" x2="16" y2="21" stroke="#1CB0F6" stroke-width="1.5"/>
    <animateTransform attributeName="transform" type="rotate" values="0 16 18;360 16 18" dur="3s" repeatCount="indefinite"/>
  </g>
</svg>
