<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Savy 思考表情 — 眼镜推头顶+托腮+问号 -->
  <defs>
    <linearGradient id="savyBodyT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>
  <!-- 身体 -->
  <ellipse cx="60" cy="84" rx="22" ry="16" fill="url(#savyBodyT)" stroke="#D4A017" stroke-width="2"/>
  <!-- 小脚 -->
  <ellipse cx="48" cy="102" rx="9" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <ellipse cx="72" cy="102" rx="9" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 头 -->
  <circle cx="60" cy="46" r="28" fill="url(#savyBodyT)" stroke="#D4A017" stroke-width="2"/>
  <!-- 头顶白毛 -->
  <ellipse cx="60" cy="19" rx="4" ry="5" fill="white" stroke="#E0E0E0" stroke-width="0.8"/>
  <!-- 眼镜推到头顶（参考原版抱臂生气的造型） -->
  <ellipse cx="48" cy="26" rx="12" ry="10" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <ellipse cx="72" cy="26" rx="12" ry="10" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="60" y1="26" x2="60" y2="26" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="36" y1="28" x2="30" y2="30" stroke="#C8A850" stroke-width="1.2"/>
  <line x1="84" y1="28" x2="90" y2="30" stroke="#C8A850" stroke-width="1.2"/>
  <!-- 腮红 -->
  <circle cx="38" cy="54" r="8" fill="#FFB0C1" opacity="0.7"/>
  <circle cx="82" cy="54" r="8" fill="#FFB0C1" opacity="0.7"/>
  <!-- 眼睛 — 一只眯一只睁（思考中） -->
  <circle cx="50" cy="46" r="4.5" fill="#1a1a2e"/>
  <circle cx="52" cy="44" r="1.8" fill="white"/>
  <path d="M64 44 Q70 40 76 44" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- 眉毛 — 微皱（思考） -->
  <path d="M42 38 Q47 35 55 37" stroke="#D4A017" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M65 37 Q73 35 78 38" stroke="#D4A017" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 鸭嘴 — 抿嘴（思考） -->
  <ellipse cx="60" cy="57" rx="9" ry="4" fill="#FF8C42" stroke="#E07030" stroke-width="1.5"/>
  <line x1="53" y1="57" x2="67" y2="57" stroke="#E07030" stroke-width="1"/>
  <!-- 嘴角微微偏（思考感） -->
  <path d="M67 57 Q69 59 68 61" stroke="#E07030" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- 项圈 + 铃铛 -->
  <path d="M42 66 Q60 74 78 66" stroke="#FF8FAB" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="60" cy="71" r="3" fill="#C8A850" stroke="#A08030" stroke-width="1"/>
  <circle cx="60" cy="71" r="1.2" fill="#A08030"/>
  <!-- 右手 — 托腮 -->
  <path d="M82 72 L88 60" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="86" cy="56" rx="6" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5" transform="rotate(15,86,56)"/>
  <!-- 左手 — 自然放下 -->
  <path d="M38 74 L26 84" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="24" cy="86" rx="6" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 头顶问号+思考泡泡（浮动） -->
  <circle cx="95" cy="22" r="3" fill="#E0E0E0">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="14" r="4" fill="#E0E0E0">
    <animate attributeName="opacity" values="0.1;0.6;0.1" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;5;3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <text x="102" y="10" font-size="18" font-weight="800" fill="#1CB0F6" font-family="Nunito, sans-serif">?
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </text>
  <!-- 小齿轮装饰（旋转） -->
  <g>
    <circle cx="14" cy="28" r="6" fill="none" stroke="#B0BEC5" stroke-width="1.5" opacity="0.5"/>
    <line x1="14" y1="21" x2="14" y2="23" stroke="#B0BEC5" stroke-width="1.5" opacity="0.5"/>
    <line x1="14" y1="33" x2="14" y2="35" stroke="#B0BEC5" stroke-width="1.5" opacity="0.5"/>
    <line x1="7" y1="28" x2="9" y2="28" stroke="#B0BEC5" stroke-width="1.5" opacity="0.5"/>
    <line x1="19" y1="28" x2="21" y2="28" stroke="#B0BEC5" stroke-width="1.5" opacity="0.5"/>
    <animateTransform attributeName="transform" type="rotate" values="0 14 28;360 14 28" dur="4s" repeatCount="indefinite"/>
  </g>
</svg>