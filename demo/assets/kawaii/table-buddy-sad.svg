<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- 表格小精灵 - 伤心状态（答错时用） -->
  <!-- 身体 -->
  <rect x="15" y="20" width="90" height="80" rx="18" ry="18" fill="url(#bodyGrad-sad)"/>
  <!-- 身体高光 -->
  <rect x="20" y="22" width="80" height="30" rx="14" ry="14" fill="rgba(255,255,255,0.12)"/>
  <!-- 表格线条装饰 -->
  <line x1="55" y1="38" x2="55" y2="82" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="58" x2="88" y2="58" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
  <!-- 左眼 - 伤心大眼 -->
  <ellipse cx="44" cy="50" rx="6" ry="6.5" fill="#1a1a2e"/>
  <ellipse cx="42.5" cy="48" rx="2.5" ry="2.5" fill="white"/>
  <!-- 右眼 -->
  <ellipse cx="76" cy="50" rx="6" ry="6.5" fill="#1a1a2e"/>
  <ellipse cx="74.5" cy="48" rx="2.5" ry="2.5" fill="white"/>
  <!-- 眉毛 - 担忧 -->
  <line x1="37" y1="40" x2="48" y2="38" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
  <line x1="83" y1="40" x2="72" y2="38" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
  <!-- 泪珠 -->
  <ellipse cx="50" cy="58" rx="2.5" ry="3.5" fill="#5BC0EB" opacity="0.7"/>
  <!-- 腮红 -->
  <ellipse cx="34" cy="58" rx="5" ry="3.5" fill="#FF6B8A" opacity="0.25"/>
  <ellipse cx="86" cy="58" rx="5" ry="3.5" fill="#FF6B8A" opacity="0.25"/>
  <!-- 嘴巴 - 伤心 -->
  <path d="M52 72 Q60 64 68 72" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- 小手 - 垂下 -->
  <ellipse cx="10" cy="68" rx="8" ry="6" fill="#E8A800" stroke="#CC9400" stroke-width="1"/>
  <ellipse cx="110" cy="68" rx="8" ry="6" fill="#E8A800" stroke="#CC9400" stroke-width="1"/>
  <!-- 小脚 -->
  <ellipse cx="42" cy="100" rx="10" ry="5" fill="#E8A800"/>
  <ellipse cx="78" cy="100" rx="10" ry="5" fill="#E8A800"/>
  <defs>
    <linearGradient id="bodyGrad-sad" x1="60" y1="20" x2="60" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
  </defs>
</svg>
