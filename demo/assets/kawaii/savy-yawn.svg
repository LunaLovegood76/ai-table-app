<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <!-- 打哈欠鸭鸭 — 嘴巴张大圆形，眼睛眯成弧线，一只手捂嘴 -->
  <defs>
    <linearGradient id="duckBodyYawn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>
  <!-- 困意 ZZZ -->
  <text x="100" y="20" font-size="16" font-weight="800" fill="#9E9E9E" font-family="Nunito, sans-serif">Z
    <animate attributeName="opacity" values="0.8;0.1;0.8" dur="2.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="2s" repeatCount="indefinite"/>
  </text>
  <text x="112" y="14" font-size="12" font-weight="800" fill="#BDBDBD" font-family="Nunito, sans-serif">z
    <animate attributeName="opacity" values="0.7;0;0.7" dur="3s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-12;0,0" dur="2.5s" repeatCount="indefinite"/>
  </text>
  <text x="120" y="10" font-size="9" font-weight="800" fill="#E0E0E0" font-family="Nunito, sans-serif">z
    <animate attributeName="opacity" values="0.6;0;0.6" dur="3.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-14;0,0" dur="3s" repeatCount="indefinite"/>
  </text>
  <!-- 小脚 -->
  <ellipse cx="57" cy="111" rx="10" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <ellipse cx="83" cy="111" rx="10" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 鸭鸭身体 -->
  <ellipse cx="70" cy="89" rx="24" ry="20" fill="url(#duckBodyYawn)" stroke="#D4A017" stroke-width="2"/>
  <!-- 左手自然下垂 -->
  <ellipse cx="42" cy="87" rx="8" ry="6" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 右手捂嘴 -->
  <ellipse cx="88" cy="64" rx="9" ry="7" fill="#FFE566" stroke="#D4A017" stroke-width="1.5" transform="rotate(10 88 64)"/>
  <!-- 鸭鸭头 -->
  <circle cx="70" cy="50" r="27" fill="url(#duckBodyYawn)" stroke="#D4A017" stroke-width="2"/>
  <!-- 头顶白毛 -->
  <ellipse cx="70" cy="24" rx="4" ry="5" fill="white" stroke="#E0E0E0" stroke-width="0.8"/>
  <!-- 腮红 -->
  <circle cx="48" cy="56" r="9" fill="#FFB0C1" opacity="0.65"/>
  <circle cx="92" cy="56" r="9" fill="#FFB0C1" opacity="0.65"/>
  <!-- 眼镜 -->
  <circle cx="58" cy="47" r="10" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <circle cx="82" cy="47" r="10" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="68" y1="47" x2="72" y2="47" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="48" y1="47" x2="43" y2="44" stroke="#C8A850" stroke-width="1.2"/>
  <line x1="92" y1="47" x2="97" y2="44" stroke="#C8A850" stroke-width="1.2"/>
  <!-- 眼睛（眯成弧线，困了） -->
  <path d="M52 46 Q58 42 64 46" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M76 46 Q82 42 88 46" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- 泪珠（打哈欠的泪） -->
  <ellipse cx="92" cy="50" rx="2" ry="3" fill="#87CEEB">
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="48;60;48" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <!-- 鸭嘴 — 张大圆形（打哈欠） -->
  <ellipse cx="70" cy="62" rx="9" ry="8" fill="#FF8C42" stroke="#E07030" stroke-width="1.5"/>
  <ellipse cx="70" cy="63" rx="6" ry="5" fill="#E05020" opacity="0.6"/>
  <!-- 项圈 + 铃铛 -->
  <path d="M48 68 Q70 76 92 68" stroke="#FF8FAB" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="70" cy="73" r="3.5" fill="#C8A850" stroke="#A08030" stroke-width="1"/>
  <circle cx="70" cy="73" r="1.5" fill="#A08030"/>
  <!-- 小星星 -->
  <polygon points="20,30 22,24 24,30 18,27 26,27" fill="#FFC107" opacity="0.4"/>
  <polygon points="15,70 17,66 19,70 15,68 19,68" fill="#E0E0E0" opacity="0.3"/>
</svg>
