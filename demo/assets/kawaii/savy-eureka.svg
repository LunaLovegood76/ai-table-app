<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Savy 灵感表情 — 头顶灯泡+眼睛放光+握拳兴奋 -->
  <defs>
    <linearGradient id="savyBodyEu" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>
  <!-- 头顶大灯泡 -->
  <g>
    <!-- 灯泡光晕 -->
    <circle cx="60" cy="8" r="14" fill="#FFC107" opacity="0.15">
      <animate attributeName="r" values="14;18;14" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <!-- 灯泡玻璃 -->
    <ellipse cx="60" cy="8" rx="9" ry="10" fill="#FFF9C4" stroke="#FFC107" stroke-width="1.5"/>
    <!-- 灯泡底座 -->
    <rect x="56" y="16" width="8" height="5" rx="1" fill="#C8A850" stroke="#A08030" stroke-width="1"/>
    <line x1="57" y1="18" x2="63" y2="18" stroke="#A08030" stroke-width="0.8"/>
    <line x1="57" y1="20" x2="63" y2="20" stroke="#A08030" stroke-width="0.8"/>
    <!-- 灯丝 -->
    <path d="M58 10 Q60 6 62 10" stroke="#FFC107" stroke-width="1.2" fill="none"/>
    <!-- 光线 -->
    <line x1="60" y1="-4" x2="60" y2="-8" stroke="#FFC107" stroke-width="1.5" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="48" y1="2" x2="44" y2="-2" stroke="#FFC107" stroke-width="1.2" stroke-linecap="round">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <line x1="72" y1="2" x2="76" y2="-2" stroke="#FFC107" stroke-width="1.2" stroke-linecap="round">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.4s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- 身体 -->
  <ellipse cx="60" cy="84" rx="22" ry="16" fill="url(#savyBodyEu)" stroke="#D4A017" stroke-width="2"/>
  <!-- 小脚（兴奋微微踮起） -->
  <ellipse cx="47" cy="101" rx="9" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <ellipse cx="73" cy="101" rx="9" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 头 -->
  <circle cx="60" cy="46" r="28" fill="url(#savyBodyEu)" stroke="#D4A017" stroke-width="2"/>
  <!-- 腮红 -->
  <circle cx="36" cy="54" r="9" fill="#FFB0C1" opacity="0.75"/>
  <circle cx="84" cy="54" r="9" fill="#FFB0C1" opacity="0.75"/>
  <!-- 眼镜 -->
  <circle cx="50" cy="44" r="11" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <circle cx="70" cy="44" r="11" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="61" y1="44" x2="59" y2="44" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="39" y1="44" x2="34" y2="41" stroke="#C8A850" stroke-width="1.2"/>
  <line x1="81" y1="44" x2="86" y2="41" stroke="#C8A850" stroke-width="1.2"/>
  <!-- 眼睛 — 放光大眼（兴奋） -->
  <circle cx="50" cy="43" r="5.5" fill="#1a1a2e"/>
  <circle cx="70" cy="43" r="5.5" fill="#1a1a2e"/>
  <!-- 大高光（星星形状） -->
  <polygon points="52,40 53,38 54,40 53,39" fill="white"/>
  <circle cx="52" cy="40" r="2.2" fill="white"/>
  <polygon points="72,40 73,38 74,40 73,39" fill="white"/>
  <circle cx="72" cy="40" r="2.2" fill="white"/>
  <!-- 小高光 -->
  <circle cx="48" cy="45" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="68" cy="45" r="1.2" fill="white" opacity="0.5"/>
  <!-- 眉毛 — 兴奋上扬 -->
  <path d="M42 35 Q48 31 55 34" stroke="#D4A017" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M65 34 Q72 31 78 35" stroke="#D4A017" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 鸭嘴 — 惊喜张嘴 -->
  <ellipse cx="60" cy="57" rx="10" ry="6" fill="#FF8C42" stroke="#E07030" stroke-width="1.5"/>
  <path d="M53 56 Q60 64 67 56" stroke="#E07030" stroke-width="1.2" fill="#E07030" opacity="0.3"/>
  <!-- 项圈 + 铃铛 -->
  <path d="M42 66 Q60 74 78 66" stroke="#FF8FAB" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="60" cy="71" r="3" fill="#C8A850" stroke="#A08030" stroke-width="1"/>
  <circle cx="60" cy="71" r="1.2" fill="#A08030"/>
  <!-- 双手握拳兴奋（向上举） -->
  <path d="M38 72 L24 58" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
  <g>
    <circle cx="22" cy="56" r="5.5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
    <path d="M19 55 L25 55" stroke="#D4A017" stroke-width="1" stroke-linecap="round"/>
    <path d="M19 57 L25 57" stroke="#D4A017" stroke-width="1" stroke-linecap="round"/>
  </g>
  <path d="M82 72 L96 58" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
  <g>
    <circle cx="98" cy="56" r="5.5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
    <path d="M95 55 L101 55" stroke="#D4A017" stroke-width="1" stroke-linecap="round"/>
    <path d="M95 57 L101 57" stroke="#D4A017" stroke-width="1" stroke-linecap="round"/>
  </g>
  <!-- 感叹号气泡 -->
  <g>
    <circle cx="104" cy="28" r="8" fill="white" stroke="#E0E0E0" stroke-width="1"/>
    <circle cx="100" cy="38" r="3" fill="white" stroke="#E0E0E0" stroke-width="0.8"/>
    <text x="101" y="32" font-size="12" font-weight="800" fill="#FF4B4B" font-family="Nunito, sans-serif" text-anchor="middle">!</text>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
  </g>
</svg>