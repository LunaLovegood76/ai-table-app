<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <!-- 表格小精灵 - 庆祝状态（答对/完成课程时用） -->
  <!-- 星星装饰 -->
  <polygon points="25,12 27,18 33,18 28,22 30,28 25,24 20,28 22,22 17,18 23,18" fill="#FFC800" opacity="0.8"/>
  <polygon points="115,8 117,13 122,13 118,16 119,21 115,18 111,21 112,16 108,13 113,13" fill="#FFC800" opacity="0.6"/>
  <polygon points="10,45 11.5,49 16,49 12.5,51.5 13.5,55.5 10,53 6.5,55.5 7.5,51.5 4,49 8.5,49" fill="#FF6B8A" opacity="0.5"/>
  <polygon points="130,40 131.5,44 136,44 132.5,46.5 133.5,50.5 130,48 126.5,50.5 127.5,46.5 124,44 128.5,44" fill="#5BC0EB" opacity="0.5"/>
  <!-- 身体 -->
  <rect x="25" y="30" width="90" height="80" rx="18" ry="18" fill="url(#bodyGrad-celebrate)"/>
  <!-- 身体高光 -->
  <rect x="30" y="32" width="80" height="30" rx="14" ry="14" fill="rgba(255,255,255,0.18)"/>
  <!-- 表格线条装饰 -->
  <line x1="65" y1="48" x2="65" y2="92" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="68" x2="98" y2="68" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"/>
  <!-- 左眼 - 开心眯眼 -->
  <path d="M48 58 Q54 52 60 58" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- 右眼 - 开心眯眼 -->
  <path d="M80 58 Q86 52 92 58" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- 腮红 -->
  <ellipse cx="44" cy="66" rx="6" ry="4" fill="#FF6B8A" opacity="0.4"/>
  <ellipse cx="96" cy="66" rx="6" ry="4" fill="#FF6B8A" opacity="0.4"/>
  <!-- 嘴巴 - 大笑 -->
  <path d="M58 74 Q70 88 82 74" stroke="#1a1a2e" stroke-width="2.5" fill="#1a1a2e" stroke-linecap="round"/>
  <!-- 舌头 -->
  <ellipse cx="70" cy="80" rx="6" ry="4" fill="#E74144"/>
  <!-- 小手 - 举起庆祝 -->
  <ellipse cx="18" cy="42" rx="8" ry="6" fill="#4CAF00" stroke="#3D9400" stroke-width="1" transform="rotate(30, 18, 42)"/>
  <ellipse cx="122" cy="42" rx="8" ry="6" fill="#4CAF00" stroke="#3D9400" stroke-width="1" transform="rotate(-30, 122, 42)"/>
  <!-- 小脚 - 跳起来 -->
  <ellipse cx="52" cy="112" rx="10" ry="5" fill="#4CAF00"/>
  <ellipse cx="88" cy="112" rx="10" ry="5" fill="#4CAF00"/>
  <!-- 跳跃阴影 -->
  <ellipse cx="70" cy="128" rx="30" ry="4" fill="#000" opacity="0.08"/>
  <defs>
    <linearGradient id="bodyGrad-celebrate" x1="70" y1="30" x2="70" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6EE722"/>
      <stop offset="100%" stop-color="#4CAF00"/>
    </linearGradient>
  </defs>
</svg>
