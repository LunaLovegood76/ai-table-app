  <ellipse cx="70" cy="52" rx="10" ry="5.5" fill="#FF8C42" stroke="#E07030" stroke-width="1.5"/>
  <path d="M63 52 Q70 58 77 52" stroke="#E07030" stroke-width="1.2" fill="none"/>
  <!-- 项圈 + 铃铛 -->
  <path d="M50 60 Q70 68 90 60" stroke="#FF8FAB" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="70" cy="65" r="3.5" fill="#C8A850" stroke="#A08030" stroke-width="1"/>
  <circle cx="70" cy="65" r="1.5" fill="#A08030"/>
  <!-- 左手 -->
  <ellipse cx="40" cy="75" rx="8" ry="6" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 右手拿权杖 -->
  <line x1="100" y1="65" x2="112" y2="42" stroke="#7B1FA2" stroke-width="4" stroke-linecap="round"/>
  <circle cx="112" cy="40" r="5" fill="#A560E8" stroke="#7B1FA2" stroke-width="1.5"/>
  <polygon points="112,35 115,30 109,30" fill="#FFC107"/>
  <!-- 小脚 -->
  <ellipse cx="57" cy="88" rx="10" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <ellipse cx="83" cy="88" rx="10" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 闪光装饰 -->
  <polygon points="125,22 127,16 129,22 123,19 131,19" fill="#A560E8" opacity="0.6"/>
  <polygon points="12,55 14,49 16,55 10,52 18,52" fill="#A560E8" opacity="0.5"/>
  <circle cx="130" cy="50" r="2.5" fill="#FFC107" opacity="0.4"/>
  <circle cx="8" cy="30" r="2" fill="#FFC107" opacity="0.3"/>
</svg>
