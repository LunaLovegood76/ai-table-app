<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <!-- L5 应用搭建师 — 玻尿酸鸭戴皇冠踩积木城堡 -->
  <defs>
    <linearGradient id="duckBody5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>
  <!-- 彩色积木城堡 -->
  <rect x="10" y="100" width="120" height="30" rx="6" fill="#EDE7F6" stroke="#A560E8" stroke-width="1.5"/>
  <rect x="16" y="90" width="22" height="15" rx="3" fill="#58CC02" stroke="#46A302" stroke-width="1.5"/>
  <rect x="42" y="82" width="22" height="23" rx="3" fill="#1CB0F6" stroke="#1899D6" stroke-width="1.5"/>
  <rect x="68" y="88" width="22" height="17" rx="3" fill="#FFC107" stroke="#FFA000" stroke-width="1.5"/>
  <rect x="94" y="92" width="22" height="13" rx="3" fill="#FF4B4B" stroke="#C62828" stroke-width="1.5"/>
  <!-- 积木窗户 -->
  <rect x="22" y="94" width="5" height="6" rx="1" fill="white" opacity="0.6"/>
  <rect x="49" y="87" width="7" height="7" rx="1.5" fill="white" opacity="0.6"/>
  <rect x="74" y="92" width="5" height="6" rx="1" fill="white" opacity="0.6"/>
  <!-- 小旗子 -->
  <line x1="53" y1="82" x2="53" y2="70" stroke="#4A148C" stroke-width="2"/>
  <path d="M53 70 L66 74 L53 78" fill="#A560E8"/>
  <!-- 鸭鸭身体 -->
  <ellipse cx="70" cy="72" rx="24" ry="16" fill="url(#duckBody5)" stroke="#D4A017" stroke-width="2"/>
  <!-- 鸭鸭头 -->
  <circle cx="70" cy="38" r="26" fill="url(#duckBody5)" stroke="#D4A017" stroke-width="2"/>
  <!-- 头顶白毛 -->
  <ellipse cx="70" cy="13" rx="4" ry="5" fill="white" stroke="#E0E0E0" stroke-width="0.8"/>
  <!-- 皇冠 -->
  <polygon points="48,28 52,14 58,22 64,8 70,22 76,8 82,22 88,14 92,28" fill="#FFC107" stroke="#FFA000" stroke-width="1.5" stroke-linejoin="round"/>
  <rect x="48" y="27" width="44" height="5" rx="2" fill="#FFC107" stroke="#FFA000" stroke-width="1"/>
  <!-- 皇冠宝石 -->
  <circle cx="58" cy="20" r="2.5" fill="#E91E63"/>
  <circle cx="70" cy="12" r="2.5" fill="#2196F3"/>
  <circle cx="82" cy="20" r="2.5" fill="#E91E63"/>
  <!-- 腮红 -->
  <circle cx="48" cy="46" r="9" fill="#FFB0C1" opacity="0.7"/>
  <circle cx="92" cy="46" r="9" fill="#FFB0C1" opacity="0.7"/>
  <!-- 眼镜 -->
  <circle cx="60" cy="38" r="10" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <circle cx="80" cy="38" r="10" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="70" y1="38" x2="70" y2="38" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="50" y1="38" x2="45" y2="35" stroke="#C8A850" stroke-width="1.2"/>
  <line x1="90" y1="38" x2="95" y2="35" stroke="#C8A850" stroke-width="1.2"/>
  <!-- 眼睛 — 得意星星眼 -->
  <polygon points="60,35 61.5,39 65,39.5 62.5,42 63,45.5 60,43.5 57,45.5 57.5,42 55,39.5 58.5,39" fill="#1a1a2e"/>
  <polygon points="80,35 81.5,39 85,39.5 82.5,42 83,45.5 80,43.5 77,45.5 77.5,42 75,39.5 78.5,39" fill="#1a1a2e"/>
