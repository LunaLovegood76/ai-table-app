<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <!-- L1 初识AI表格 — 玻尿酸鸭趴在表格上好奇地看 -->
  <defs>
    <linearGradient id="duckBody1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>
  <!-- 表格 -->
  <rect x="15" y="75" width="110" height="55" rx="8" fill="#E8F5E9" stroke="#58CC02" stroke-width="2.5"/>
  <line x1="15" y1="92" x2="125" y2="92" stroke="#A5D6A7" stroke-width="1.5"/>
  <line x1="15" y1="107" x2="125" y2="107" stroke="#A5D6A7" stroke-width="1.5"/>
  <line x1="55" y1="75" x2="55" y2="130" stroke="#A5D6A7" stroke-width="1.5"/>
  <line x1="90" y1="75" x2="90" y2="130" stroke="#A5D6A7" stroke-width="1.5"/>
  <!-- 表格里的小勾 -->
  <path d="M28 84 L32 88 L40 80" stroke="#58CC02" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M65 84 L69 88 L77 80" stroke="#58CC02" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M28 100 L32 104 L40 96" stroke="#58CC02" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 鸭鸭身体（趴着） -->
  <ellipse cx="70" cy="68" rx="28" ry="14" fill="url(#duckBody1)" stroke="#D4A017" stroke-width="2"/>
  <!-- 前爪搭在表格上 -->
  <ellipse cx="42" cy="76" rx="10" ry="6" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <ellipse cx="98" cy="76" rx="10" ry="6" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 鸭鸭头 -->
  <circle cx="70" cy="40" r="26" fill="url(#duckBody1)" stroke="#D4A017" stroke-width="2"/>
  <!-- 头顶白毛 -->
  <ellipse cx="70" cy="15" rx="4" ry="5" fill="white" stroke="#E0E0E0" stroke-width="0.8"/>
  <!-- 腮红 -->
  <circle cx="48" cy="46" r="9" fill="#FFB0C1" opacity="0.7"/>
  <circle cx="92" cy="46" r="9" fill="#FFB0C1" opacity="0.7"/>
  <!-- 眼镜 -->
  <circle cx="58" cy="38" r="11" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <circle cx="82" cy="38" r="11" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="69" y1="38" x2="71" y2="38" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="47" y1="38" x2="42" y2="35" stroke="#C8A850" stroke-width="1.2"/>
  <line x1="93" y1="38" x2="98" y2="35" stroke="#C8A850" stroke-width="1.2"/>
  <!-- 眼睛 — 好奇大眼 -->
  <circle cx="58" cy="37" r="4.5" fill="#1a1a2e"/>
  <circle cx="82" cy="37" r="4.5" fill="#1a1a2e"/>
  <circle cx="60" cy="35" r="1.8" fill="white"/>
  <circle cx="84" cy="35" r="1.8" fill="white"/>
  <!-- 鸭嘴 -->
  <ellipse cx="70" cy="50" rx="10" ry="5" fill="#FF8C42" stroke="#E07030" stroke-width="1.5"/>
  <line x1="62" y1="50" x2="78" y2="50" stroke="#E07030" stroke-width="1"/>
  <!-- 项圈 + 铃铛 -->
  <path d="M48 58 Q70 66 92 58" stroke="#FF8FAB" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="70" cy="63" r="3.5" fill="#C8A850" stroke="#A08030" stroke-width="1"/>
  <circle cx="70" cy="63" r="1.5" fill="#A08030"/>
  <!-- 头顶问号 -->
  <text x="100" y="18" font-size="22" font-weight="800" fill="#58CC02" font-family="Nunito, sans-serif">?</text>
  <!-- 小星星装饰 -->
  <polygon points="18,22 20,16 22,22 16,19 24,19" fill="#FFC107" opacity="0.6"/>
  <polygon points="120,55 122,51 124,55 120,53 124,53" fill="#FFC107" opacity="0.5"/>
  <polygon points="130,20 132,16 134,20 130,18 134,18" fill="#58CC02" opacity="0.4"/>
</svg>
