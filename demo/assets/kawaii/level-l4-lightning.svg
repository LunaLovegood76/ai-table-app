<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 150" width="140" height="150">
  <!-- L4 自动化专家 — 玻尿酸鸭骑在火箭上飞行 -->
  <defs>
    <linearGradient id="duckBody4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>
  <!-- 火箭尾焰 -->
  <path d="M47 145 Q58 125 54 112" stroke="#FF9800" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M58 148 Q67 128 63 115" stroke="#FFC107" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M70 145 Q74 128 70 117" stroke="#FF5722" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- 火箭 -->
  <path d="M38 110 Q38 72 60 50 L64 50 Q86 72 86 110 Z" fill="#FF4B4B" stroke="#C62828" stroke-width="2.5"/>
  <path d="M45 107 Q45 78 60 55 L63 55 Q74 78 74 107" fill="#FF8A80" stroke="none"/>
  <!-- 火箭窗户 -->
  <circle cx="62" cy="84" r="10" fill="#E3F2FD" stroke="#C62828" stroke-width="2"/>
  <circle cx="62" cy="82" r="6" fill="#BBDEFB"/>
  <!-- 火箭翅膀 -->
  <path d="M38 104 L22 120 L38 115" fill="#FF4B4B" stroke="#C62828" stroke-width="1.5"/>
  <path d="M86 104 L102 120 L86 115" fill="#FF4B4B" stroke="#C62828" stroke-width="1.5"/>
  <!-- 鸭鸭身体（骑在火箭上） -->
  <ellipse cx="62" cy="48" rx="18" ry="10" fill="url(#duckBody4)" stroke="#D4A017" stroke-width="2"/>
  <!-- 鸭鸭头 -->
  <circle cx="62" cy="28" r="20" fill="url(#duckBody4)" stroke="#D4A017" stroke-width="2"/>
  <!-- 头顶白毛 -->
  <ellipse cx="62" cy="9" rx="3" ry="4" fill="white" stroke="#E0E0E0" stroke-width="0.8"/>
  <!-- 腮红 -->
  <circle cx="45" cy="32" r="7" fill="#FFB0C1" opacity="0.7"/>
  <circle cx="79" cy="32" r="7" fill="#FFB0C1" opacity="0.7"/>
  <!-- 眼镜 -->
  <circle cx="54" cy="26" r="8" fill="none" stroke="#C8A850" stroke-width="1.5"/>
  <circle cx="70" cy="26" r="8" fill="none" stroke="#C8A850" stroke-width="1.5"/>
  <line x1="62" y1="26" x2="62" y2="26" stroke="#C8A850" stroke-width="1.5"/>
  <line x1="46" y1="26" x2="42" y2="24" stroke="#C8A850" stroke-width="1"/>
  <line x1="78" y1="26" x2="82" y2="24" stroke="#C8A850" stroke-width="1"/>
  <!-- 眼睛 — 兴奋 -->
  <circle cx="54" cy="25" r="3.5" fill="#1a1a2e"/>
  <circle cx="70" cy="25" r="3.5" fill="#1a1a2e"/>
  <circle cx="56" cy="23.5" r="1.3" fill="white"/>
  <circle cx="72" cy="23.5" r="1.3" fill="white"/>
  <!-- 鸭嘴 — 开心大笑 -->
  <ellipse cx="62" cy="37" rx="8" ry="4.5" fill="#FF8C42" stroke="#E07030" stroke-width="1.5"/>
  <path d="M56 37 Q62 42 68 37" stroke="#E07030" stroke-width="1" fill="none"/>
  <!-- 项圈 + 铃铛 -->
  <path d="M46 42 Q62 48 78 42" stroke="#FF8FAB" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="62" cy="46" r="2.5" fill="#C8A850" stroke="#A08030" stroke-width="0.8"/>
  <!-- 手臂张开欢呼 -->
  <path d="M44 44 L30 32" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="28" cy="30" rx="5" ry="4" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <path d="M80 44 L94 32" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="96" cy="30" rx="5" ry="4" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 闪电装饰 -->
  <polygon points="112,40 116,53 112,53 118,67 108,53 112,53" fill="#FFC107" stroke="#FF9800" stroke-width="1"/>
  <polygon points="15,55 18,63 15,63 20,73 12,63 15,63" fill="#FFC107" stroke="#FF9800" stroke-width="0.8" opacity="0.7"/>
  <!-- 速度线 -->
  <line x1="5" y1="70" x2="18" y2="70" stroke="#FF4B4B" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="2" y1="80" x2="12" y2="80" stroke="#FF4B4B" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="115" y1="75" x2="130" y2="75" stroke="#FF4B4B" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="120" y1="85" x2="135" y2="85" stroke="#FF4B4B" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <!-- 小星星 -->
  <polygon points="125,18 127,13 129,18 124,15 130,15" fill="#FFC107" opacity="0.6"/>
  <polygon points="8,30 10,25 12,30 8,28 12,28" fill="#FFC107" opacity="0.5"/>
</svg>
