<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- 表格小精灵 - 开心状态 -->
  <!-- 身体：圆润的表格形状 -->
  <rect x="15" y="20" width="90" height="80" rx="18" ry="18" fill="#58CC02"/>
  <rect x="15" y="20" width="90" height="80" rx="18" ry="18" fill="url(#bodyGrad-happy)"/>
  <!-- 身体高光 -->
  <rect x="20" y="22" width="80" height="30" rx="14" ry="14" fill="rgba(255,255,255,0.15)"/>
  <!-- 表格线条装饰 -->
  <line x1="55" y1="38" x2="55" y2="82" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="58" x2="88" y2="58" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"/>
  <!-- 左眼 -->
  <ellipse cx="44" cy="50" rx="5" ry="5.5" fill="#1a1a2e"/>
  <ellipse cx="42.5" cy="48.5" rx="2" ry="2" fill="white"/>
  <!-- 右眼 -->
  <ellipse cx="76" cy="50" rx="5" ry="5.5" fill="#1a1a2e"/>
  <ellipse cx="74.5" cy="48.5" rx="2" ry="2" fill="white"/>
  <!-- 腮红 -->
  <ellipse cx="34" cy="58" rx="5" ry="3.5" fill="#FF6B8A" opacity="0.35"/>
  <ellipse cx="86" cy="58" rx="5" ry="3.5" fill="#FF6B8A" opacity="0.35"/>
  <!-- 嘴巴 - 开心微笑 -->
  <path d="M52 65 Q60 75 68 65" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- 小手 - 左 -->
  <ellipse cx="10" cy="62" rx="8" ry="6" fill="#4CAF00" stroke="#3D9400" stroke-width="1"/>
  <!-- 小手 - 右（挥手） -->
  <ellipse cx="110" cy="55" rx="8" ry="6" fill="#4CAF00" stroke="#3D9400" stroke-width="1" transform="rotate(-15, 110, 55)"/>
  <!-- 小脚 -->
  <ellipse cx="42" cy="100" rx="10" ry="5" fill="#4CAF00"/>
  <ellipse cx="78" cy="100" rx="10" ry="5" fill="#4CAF00"/>
  <defs>
    <linearGradient id="bodyGrad-happy" x1="60" y1="20" x2="60" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6EE722"/>
      <stop offset="100%" stop-color="#4CAF00"/>
    </linearGradient>
  </defs>
</svg>
