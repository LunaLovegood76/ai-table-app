<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <style>
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-2.5px)} 75%{transform:translateX(2.5px)} }
    .angry-body { animation: shake 0.15s ease-in-out infinite; }
  </style>
  <!-- 皱眉抱臂鸭鸭 — 眼镜推到头顶，八字眉，双臂交叉，不服气 -->
  <defs>
    <linearGradient id="duckBodyAngry" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>
  <!-- 小脚（叉腰站立） -->
  <ellipse cx="55" cy="116" rx="11" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <ellipse cx="85" cy="116" rx="11" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 鸭鸭身体 -->
  <ellipse cx="70" cy="92" rx="26" ry="22" fill="url(#duckBodyAngry)" stroke="#D4A017" stroke-width="2"/>
  <!-- 双臂交叉（抱臂） -->
  <path d="M48 80 Q55 87 68 82 Q72 80 76 82 Q88 87 95 80" stroke="#D4A017" stroke-width="2.5" fill="url(#duckBodyAngry)" stroke-linecap="round"/>
  <ellipse cx="52" cy="82" rx="10" ry="7" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <ellipse cx="88" cy="82" rx="10" ry="7" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 鸭鸭头 -->
  <circle cx="70" cy="50" r="28" fill="url(#duckBodyAngry)" stroke="#D4A017" stroke-width="2"/>
  <!-- 头顶白毛 -->
  <ellipse cx="70" cy="23" rx="4" ry="5" fill="white" stroke="#E0E0E0" stroke-width="0.8"/>
  <!-- 眼镜推到头顶 -->
  <ellipse cx="58" cy="30" rx="12" ry="10" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <ellipse cx="82" cy="30" rx="12" ry="10" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="70" y1="30" x2="70" y2="30" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="46" y1="30" x2="40" y2="28" stroke="#C8A850" stroke-width="1.2"/>
  <line x1="94" y1="30" x2="100" y2="28" stroke="#C8A850" stroke-width="1.2"/>
  <!-- 腮红 -->
  <circle cx="48" cy="56" r="10" fill="#FFB0C1" opacity="0.65"/>
  <circle cx="92" cy="56" r="10" fill="#FFB0C1" opacity="0.65"/>
  <!-- 八字眉（皱眉生气） -->
  <line x1="50" y1="40" x2="62" y2="44" stroke="#5D4E37" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="90" y1="40" x2="78" y2="44" stroke="#5D4E37" stroke-width="2.8" stroke-linecap="round"/>
  <!-- 眼睛（不服气的小眼神） -->
  <circle cx="58" cy="48" r="4" fill="#1a1a2e"/>
  <circle cx="82" cy="48" r="4" fill="#1a1a2e"/>
  <circle cx="59.5" cy="47" r="1.3" fill="white"/>
  <circle cx="83.5" cy="47" r="1.3" fill="white"/>
  <!-- 鸭嘴 — 嘟嘴不满 -->
  <ellipse cx="70" cy="60" rx="10" ry="5" fill="#FF8C42" stroke="#E07030" stroke-width="1.5"/>
  <line x1="63" y1="61" x2="77" y2="61" stroke="#E07030" stroke-width="1.2"/>
  <!-- 项圈 + 铃铛 -->
  <path d="M48 68 Q70 76 92 68" stroke="#FF8FAB" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="70" cy="73" r="3.5" fill="#C8A850" stroke="#A08030" stroke-width="1"/>
  <circle cx="70" cy="73" r="1.5" fill="#A08030"/>
  <!-- 生气符号 -->
  <g transform="translate(100,25)">
    <animate attributeName="opacity" values="1;0;1" dur="0.5s" repeatCount="indefinite"/>
    <line x1="0" y1="0" x2="8" y2="8" stroke="#FF4466" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="8" y1="0" x2="0" y2="8" stroke="#FF4466" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="-2" x2="4" y2="10" stroke="#FF4466" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-2" y1="4" x2="10" y2="4" stroke="#FF4466" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- 闪光装饰 -->
  <polygon points="125,120 127,116 129,120 125,118 129,118" fill="#C8A850" opacity="0.5"/>
</svg>
