<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Savy 开心表情 — 睁大眼+微笑+挥手 -->
  <defs>
    <linearGradient id="savyBodyH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>
  <!-- 身体 -->
  <ellipse cx="60" cy="82" rx="22" ry="16" fill="url(#savyBodyH)" stroke="#D4A017" stroke-width="2"/>
  <!-- 小脚 -->
  <ellipse cx="47" cy="100" rx="9" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <ellipse cx="73" cy="100" rx="9" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 头 -->
  <circle cx="60" cy="46" r="28" fill="url(#savyBodyH)" stroke="#D4A017" stroke-width="2"/>
  <!-- 头顶白毛 -->
  <ellipse cx="60" cy="19" rx="4" ry="5" fill="white" stroke="#E0E0E0" stroke-width="0.8"/>
  <!-- 腮红 -->
  <circle cx="36" cy="52" r="9" fill="#FFB0C1" opacity="0.7"/>
  <circle cx="84" cy="52" r="9" fill="#FFB0C1" opacity="0.7"/>
  <!-- 眼镜 -->
  <circle cx="50" cy="44" r="11" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <circle cx="70" cy="44" r="11" fill="none" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="61" y1="44" x2="59" y2="44" stroke="#C8A850" stroke-width="1.8"/>
  <line x1="39" y1="44" x2="34" y2="41" stroke="#C8A850" stroke-width="1.2"/>
  <line x1="81" y1="44" x2="86" y2="41" stroke="#C8A850" stroke-width="1.2"/>
  <!-- 眼睛 — 睁大亮晶晶 -->
  <circle cx="50" cy="43" r="5" fill="#1a1a2e"/>
  <circle cx="70" cy="43" r="5" fill="#1a1a2e"/>
  <circle cx="52" cy="41" r="2" fill="white"/>
  <circle cx="72" cy="41" r="2" fill="white"/>
  <circle cx="48" cy="45" r="1" fill="white" opacity="0.5"/>
  <circle cx="68" cy="45" r="1" fill="white" opacity="0.5"/>
  <!-- 鸭嘴 — 微笑 -->
  <ellipse cx="60" cy="56" rx="10" ry="5" fill="#FF8C42" stroke="#E07030" stroke-width="1.5"/>
  <path d="M53 56 Q60 62 67 56" stroke="#E07030" stroke-width="1.2" fill="none"/>
  <!-- 项圈 + 铃铛 -->
  <path d="M42 66 Q60 74 78 66" stroke="#FF8FAB" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="60" cy="71" r="3" fill="#C8A850" stroke="#A08030" stroke-width="1"/>
  <circle cx="60" cy="71" r="1.2" fill="#A08030"/>
  <!-- 左手 — 自然下垂 -->
  <path d="M38 74 L26 82" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="24" cy="84" rx="6" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 右手 — 挥手（摆动） -->
  <g>
    <path d="M82 72 L96 58" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="98" cy="56" rx="6" ry="5" fill="#FFE566" stroke="#D4A017" stroke-width="1.5" transform="rotate(-10,98,56)"/>
    <animateTransform attributeName="transform" type="rotate" values="-5 82 72;10 82 72;-5 82 72" dur="0.8s" repeatCount="indefinite"/>
  </g>
  <!-- 挥手动态线 -->
  <path d="M104 48 Q108 52 106 56" stroke="#FFC107" stroke-width="1.5" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="0;0.8;0" dur="1s" repeatCount="indefinite"/>
  </path>
  <path d="M108 50 Q112 54 110 58" stroke="#FFC107" stroke-width="1.2" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="0;0.6;0" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <!-- 右手挥动 -->
  <!-- 小星星 -->
  <polygon points="14,30 16,25 18,30 13,27 19,27" fill="#FFC107">
    <animate attributeName="opacity" values="0.1;1;0.1" dur="1.5s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="105,28 107,23 109,28 104,26 110,26" fill="#58CC02">
    <animate attributeName="opacity" values="0.1;1;0.1" dur="2s" repeatCount="indefinite"/>
  </polygon>
</svg>