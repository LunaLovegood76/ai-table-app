<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" width="380" height="100">
  <!-- 圆角方形图标背景 -->
  <rect x="0" y="10" width="80" height="80" rx="18" ry="18" fill="#FFF8E7" stroke="#F0D080" stroke-width="1.5"/>

  <!-- 玻尿酸鸭身体 -->
  <ellipse cx="40" cy="68" rx="20" ry="17" fill="#1a1a1a"/>

  <!-- 头部（大圆头） -->
  <circle cx="40" cy="42" r="17" fill="#1a1a1a"/>

  <!-- 眼睛白色 -->
  <circle cx="33" cy="39" r="4.5" fill="white"/>
  <circle cx="47" cy="39" r="4.5" fill="white"/>
  <!-- 眼珠 -->
  <circle cx="34" cy="39" r="2.8" fill="#1a1a1a"/>
  <circle cx="48" cy="39" r="2.8" fill="#1a1a1a"/>
  <!-- 眼睛高光 -->
  <circle cx="35" cy="37.5" r="1.1" fill="white"/>
  <circle cx="49" cy="37.5" r="1.1" fill="white"/>

  <!-- 玻尿酸嘴唇（核心特征：超饱满厚嘴唇） -->
  <ellipse cx="40" cy="53" rx="10" ry="6.5" fill="#E8A020"/>
  <!-- 上嘴唇弧度 -->
  <path d="M30 51 Q35 47 40 51 Q45 47 50 51" fill="#D4900A" stroke="none"/>
  <!-- 嘴唇中缝 -->
  <line x1="30" y1="53" x2="50" y2="53" stroke="#C07810" stroke-width="1.2"/>
  <!-- 嘴唇高光（玻尿酸感） -->
  <ellipse cx="37" cy="50.5" rx="4" ry="2" fill="white" opacity="0.4"/>

  <!-- 头顶羽毛 -->
  <ellipse cx="38" cy="26" rx="3" ry="6" fill="#1a1a1a" transform="rotate(-12 38 26)"/>
  <ellipse cx="44" cy="27" rx="2.5" ry="5" fill="#1a1a1a" transform="rotate(18 44 27)"/>

  <!-- 翅膀 -->
  <ellipse cx="22" cy="69" rx="7" ry="11" fill="#111" transform="rotate(18 22 69)"/>
  <ellipse cx="58" cy="69" rx="7" ry="11" fill="#111" transform="rotate(-18 58 69)"/>

  <!-- 脚 -->
  <ellipse cx="33" cy="84" rx="7" ry="3.5" fill="#E8A020" transform="rotate(-12 33 84)"/>
  <ellipse cx="47" cy="84" rx="7" ry="3.5" fill="#E8A020" transform="rotate(12 47 84)"/>

  <!-- AI 徽章 -->
  <circle cx="65" cy="75" r="11" fill="#4A90E2"/>
  <text x="65" y="79" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="8.5" fill="white">AI</text>

  <!-- 产品名称文字 -->
  <!-- HappyDuck -->
  <text x="100" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700" font-size="30" fill="#1a1a1a" letter-spacing="-0.5">HappyDuck</text>
  <!-- AI 后缀 -->
  <text x="310" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700" font-size="30" fill="#4A90E2"> AI</text>
  <!-- 中文副标题 -->
  <text x="100" y="74" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-weight="400" font-size="14" fill="#888888" letter-spacing="2">欢乐鸭 · AI 表格学习系统</text>
</svg>
