<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HappyDuck AI 像玩游戏一样学习钉钉AI表格</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/style.css?v=2">
  <style>
    /* ====== 开屏页样式 ====== */
    .splash-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #0F1E35 0%, #1C2B4A 50%, #162240 100%);
      transition: opacity 0.6s ease, transform 0.6s ease;
      overflow: hidden;
    }
    .splash-screen.fade-out {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    /* 粒子画布 */
    .splash-particles {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* 鸭子容器 */
    .splash-duck-wrap {
      position: relative;
      z-index: 1;
      animation: splash-duck-float 3s ease-in-out infinite;
    }
    @keyframes splash-duck-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* 鸭子 SVG 内的眨眼动画 */
    .duck-eye-lid {
      transform-origin: center;
      animation: duck-blink 4s ease-in-out infinite;
    }
    .duck-eye-lid-right {
      transform-origin: center;
      animation: duck-blink 4s ease-in-out infinite 0.05s;
    }
    @keyframes duck-blink {
      0%, 42%, 50%, 100% { transform: scaleY(1); }
      45%, 47% { transform: scaleY(0.05); }
    }

    /* 鸭子周围的光晕 */
    .splash-glow {
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,224,51,0.15) 0%, rgba(255,224,51,0) 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: splash-glow-pulse 3s ease-in-out infinite;
      z-index: 0;
    }
    @keyframes splash-glow-pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    /* 品牌文字 */
    .splash-brand {
      position: relative;
      z-index: 1;
      margin-top: 28px;
      text-align: center;
    }
    .splash-brand-title {
      font-family: 'Nunito', sans-serif;
      font-size: 28px;
      font-weight: 900;
      color: #FFE033;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 16px rgba(255,224,51,0.3);
    }
    .splash-brand-sub {
      font-family: 'Nunito', 'PingFang SC', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      margin-top: 6px;
      letter-spacing: 2px;
    }

    /* 底部加载指示器 */
    .splash-loader {
      position: relative;
      z-index: 1;
      margin-top: 48px;
      display: flex;
      gap: 8px;
    }
    .splash-loader-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,224,51,0.5);
      animation: splash-dot-bounce 1.4s ease-in-out infinite;
    }
    .splash-loader-dot:nth-child(2) { animation-delay: 0.16s; }
    .splash-loader-dot:nth-child(3) { animation-delay: 0.32s; }
    @keyframes splash-dot-bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1.2); opacity: 1; }
    }

    /* 头顶羽毛摇摆 */
    .duck-feather {
      transform-origin: bottom center;
      animation: feather-sway 2.5s ease-in-out infinite;
    }
    .duck-feather:nth-child(2) { animation-delay: 0.15s; }
    .duck-feather:nth-child(3) { animation-delay: 0.3s; }
    @keyframes feather-sway {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(4deg); }
      75% { transform: rotate(-4deg); }
    }

    /* 星星闪烁 */
    .duck-star {
      animation: star-twinkle 2s ease-in-out infinite;
    }
    @keyframes star-twinkle {
      0%, 100% { opacity: 0.9; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.7); }
    }
  </style>
</head>
<body>

  <!-- ====== 开屏页 ====== -->
  <div class="splash-screen" id="splashScreen">
    <canvas class="splash-particles" id="splashParticles"></canvas>

    <div class="splash-duck-wrap">
      <div class="splash-glow"></div>
      <svg width="180" height="180" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="sDuckGrad" x1="20%" y1="0%" x2="80%" y2="100%">
            <stop offset="0%" style="stop-color:#FFE033"/>
            <stop offset="100%" style="stop-color:#F5B800"/>
          </linearGradient>
          <linearGradient id="sWingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#F5C800"/>
            <stop offset="100%" style="stop-color:#D4A000"/>
          </linearGradient>
        </defs>

        <!-- 身体 -->
        <ellipse cx="60" cy="80" rx="28" ry="22" fill="url(#sDuckGrad)"/>
        <!-- 头部 -->
        <circle cx="60" cy="50" r="24" fill="url(#sDuckGrad)"/>
        <!-- 头部高光 -->
        <ellipse cx="52" cy="40" rx="9" ry="6" fill="white" opacity="0.18"/>

        <!-- 翅膀 -->
        <ellipse cx="36" cy="80" rx="10" ry="15" fill="url(#sWingGrad)" transform="rotate(22 36 80)">
          <animateTransform attributeName="transform" type="rotate" values="22 36 80;18 36 80;22 36 80" dur="2s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="84" cy="80" rx="10" ry="15" fill="url(#sWingGrad)" transform="rotate(-22 84 80)">
          <animateTransform attributeName="transform" type="rotate" values="-22 84 80;-18 84 80;-22 84 80" dur="2s" repeatCount="indefinite"/>
        </ellipse>

        <!-- 眼睛（带眨眼动效） -->
        <!-- 左眼 -->
        <circle cx="52" cy="46" r="7" fill="white"/>
        <g class="duck-eye-lid">
          <circle cx="53.5" cy="46.5" r="4.5" fill="#1C2B4A"/>
          <circle cx="55" cy="44.5" r="1.8" fill="white"/>
        </g>
        <!-- 左眼眼皮（眨眼时覆盖） -->
        <ellipse cx="52" cy="46" rx="7.5" ry="7.5" fill="url(#sDuckGrad)" class="duck-eye-lid" style="transform-origin:52px 46px;">
          <animate attributeName="ry" values="0;0;0;7.5;7.5;0;0;0" keyTimes="0;0.42;0.44;0.46;0.48;0.50;0.52;1" dur="4s" repeatCount="indefinite"/>
        </ellipse>
        <!-- 右眼 -->
        <circle cx="68" cy="46" r="7" fill="white"/>
        <g class="duck-eye-lid-right">
          <circle cx="69.5" cy="46.5" r="4.5" fill="#1C2B4A"/>
          <circle cx="71" cy="44.5" r="1.8" fill="white"/>
        </g>
        <!-- 右眼眼皮 -->
        <ellipse cx="68" cy="46" rx="7.5" ry="7.5" fill="url(#sDuckGrad)" class="duck-eye-lid-right" style="transform-origin:68px 46px;">
          <animate attributeName="ry" values="0;0;0;7.5;7.5;0;0;0" keyTimes="0;0.42;0.44;0.46;0.48;0.50;0.52;1" dur="4s" repeatCount="indefinite" begin="0.05s"/>
        </ellipse>

        <!-- 玻尿酸嘴唇 -->
        <ellipse cx="60" cy="63" rx="14" ry="9" fill="#FF8C00"/>
        <path d="M46 61 Q53 55 60 61 Q67 55 74 61" fill="#E07000"/>
        <line x1="46" y1="63" x2="74" y2="63" stroke="#C05800" stroke-width="1.5"/>
        <ellipse cx="55" cy="59" rx="6" ry="3" fill="white" opacity="0.4"/>

        <!-- 头顶羽毛（带摇摆动效） -->
        <ellipse class="duck-feather" cx="54" cy="27" rx="3" ry="8" fill="#F5B800" transform="rotate(-20 54 27)"/>
        <ellipse class="duck-feather" cx="61" cy="25" rx="3.5" ry="9" fill="#FFE033" transform="rotate(0 61 25)"/>
        <ellipse class="duck-feather" cx="68" cy="28" rx="3" ry="7" fill="#F5B800" transform="rotate(18 68 28)"/>

        <!-- 脚 -->
        <ellipse cx="50" cy="100" rx="10" ry="4.5" fill="#FF8C00" transform="rotate(-12 50 100)"/>
        <ellipse cx="70" cy="100" rx="10" ry="4.5" fill="#FF8C00" transform="rotate(12 70 100)"/>

        <!-- 星星（闪烁） -->
        <path class="duck-star" d="M40 30 L41.2 33.5 L45 33.5 L42 35.8 L43.2 39.5 L40 37.2 L36.8 39.5 L38 35.8 L35 33.5 L38.8 33.5 Z" fill="white" opacity="0.9"/>
        <path class="duck-star" style="animation-delay:0.7s" d="M88 32 L89 34.5 L91.5 34.5 L89.5 36 L90.2 38.5 L88 37 L85.8 38.5 L86.5 36 L84.5 34.5 L87 34.5 Z" fill="white" opacity="0.7" transform="scale(0.8) translate(10 5)"/>
      </svg>
    </div>

    <div class="splash-brand">
      <div class="splash-brand-title">HappyDuck AI</div>
      <div class="splash-brand-sub">欢乐鸭 · AI 表格学习系统</div>
    </div>

    <div class="splash-loader">
      <div class="splash-loader-dot"></div>
      <div class="splash-loader-dot"></div>
      <div class="splash-loader-dot"></div>
    </div>
  </div>

  <!-- 粒子动效脚本 -->
  <script>
  (function() {
    const canvas = document.getElementById('splashParticles');
    const ctx = canvas.getContext('2d');
    let width, height, particles, animationId;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    function createParticles() {
      particles = [];
      const count = Math.min(80, Math.floor(width * height / 8000));
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: Math.random() * 2.5 + 0.8,
          speedX: (Math.random() - 0.5) * 0.6,
          speedY: (Math.random() - 0.5) * 0.6,
          opacity: Math.random() * 0.5 + 0.2,
          opacitySpeed: (Math.random() - 0.5) * 0.008,
          color: ['#FFE033', '#F5B800', '#FF8C00', '#58CC02', '#1CB0F6', '#A560E8', '#FFFFFF'][Math.floor(Math.random() * 7)]
        });
      }
    }

    function drawParticles() {
      ctx.clearRect(0, 0, width, height);

      for (const particle of particles) {
        particle.x += particle.speedX;
        particle.y += particle.speedY;
        particle.opacity += particle.opacitySpeed;

        if (particle.opacity <= 0.1 || particle.opacity >= 0.7) {
          particle.opacitySpeed *= -1;
        }

        if (particle.x < -10) particle.x = width + 10;
        if (particle.x > width + 10) particle.x = -10;
        if (particle.y < -10) particle.y = height + 10;
        if (particle.y > height + 10) particle.y = -10;

        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
        ctx.fillStyle = particle.color;
        ctx.globalAlpha = particle.opacity;
        ctx.fill();

        /* 给较大的粒子加光晕 */
        if (particle.radius > 1.8) {
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.radius * 3, 0, Math.PI * 2);
          const gradient = ctx.createRadialGradient(
            particle.x, particle.y, particle.radius * 0.5,
            particle.x, particle.y, particle.radius * 3
          );
          gradient.addColorStop(0, particle.color);
          gradient.addColorStop(1, 'transparent');
          ctx.fillStyle = gradient;
          ctx.globalAlpha = particle.opacity * 0.3;
          ctx.fill();
        }
      }

      /* 连线效果：距离近的粒子之间画线 */
      ctx.globalAlpha = 1;
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          if (distance < 100) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = 'rgba(255,224,51,' + (0.08 * (1 - distance / 100)) + ')';
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }

      animationId = requestAnimationFrame(drawParticles);
    }

    resize();
    createParticles();
    drawParticles();
    window.addEventListener('resize', () => { resize(); createParticles(); });

    /* 暴露停止方法 */
    window._stopSplashParticles = function() {
      cancelAnimationFrame(animationId);
    };
  })();
  </script>

  <div id="app" style="visibility:hidden;">
  </div>

  <script src="js/courses-l2.js"></script>
  <script src="js/courses-l3.js"></script>
  <script src="js/courses-l4.js"></script>
  <script src="js/courses-l5.js"></script>
  <script src="js/courses.js"></script>
  <script src="js/app.js"></script>

  <!-- 开屏页过渡控制 -->
  <script>
  (function() {
    /* JS 全部加载完成后，延迟一小段时间再淡出开屏页 */
    function dismissSplash() {
      const splash = document.getElementById('splashScreen');
      const appEl = document.getElementById('app');
      if (!splash) return;

      appEl.style.visibility = 'visible';
      splash.classList.add('fade-out');

      setTimeout(() => {
        splash.remove();
        if (window._stopSplashParticles) window._stopSplashParticles();
      }, 700);
    }

    /* 确保至少展示 1.8 秒开屏页 */
    const minDisplayTime = 1800;
    const startTime = Date.now();

    if (document.readyState === 'complete') {
      const elapsed = Date.now() - startTime;
      setTimeout(dismissSplash, Math.max(0, minDisplayTime - elapsed));
    } else {
      window.addEventListener('load', function() {
        const elapsed = Date.now() - startTime;
        setTimeout(dismissSplash, Math.max(0, minDisplayTime - elapsed));
      });
    }
  })();
  </script>
</body>
</html>
