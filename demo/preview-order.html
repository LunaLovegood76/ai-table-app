<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>排序题交互预览</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #3B82F6;
      --blue-dark: #1E40AF;
      --green: #22C55E;
      --green-dark: #15803D;
      --red: #EF4444;
      --correct: #22C55E;
      --incorrect: #EF4444;
      --gray-50: #F8FAFC;
      --gray-100: #F1F5F9;
      --gray-200: #E2E8F0;
      --gray-300: #CBD5E1;
      --gray-400: #94A3B8;
      --gray-500: #475569;
      --gray-600: #1E293B;
      --white: #FFFFFF;
      --radius: 16px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --transition: all 0.2s ease;
      --border-color: rgba(107, 114, 148, 0.24);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--gray-50);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .preview-container {
      max-width: 480px;
      width: 100%;
    }

    .preview-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
      text-align: center;
    }

    /* 题目卡片 */
    .question-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 28px 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
    }

    .question-type-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
      text-transform: uppercase;
      background: #F0E6FF;
      color: #7C3AED;
    }

    .question-card h3 {
      font-size: 18px;
      font-weight: 800;
      color: var(--gray-600);
      margin-bottom: 20px;
      line-height: 1.4;
    }

    /* ====== 排序题 — 下拉选步骤模式 ====== */
    .order-hint {
      font-size: 13px;
      color: #7C3AED;
      background: #F5F0FF;
      padding: 8px 14px;
      border-radius: var(--radius-xs);
      margin-bottom: 14px;
      font-weight: 600;
      border: 1px solid #E4D8FF;
      text-align: center;
    }

    .order-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .order-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--white);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xs);
      font-size: 14px;
      color: var(--gray-500);
      user-select: none;
    }

    .order-item.assigned {
      border-color: var(--blue);
      background: #F0F8FF;
    }

    .order-item.correct {
      border-color: var(--correct);
      background: #E6FFE6;
    }

    .order-item.incorrect {
      border-color: var(--incorrect);
      background: #FFE6E6;
    }

    .order-text {
      flex: 1;
      line-height: 1.4;
    }

    /* 步骤下拉选择器 */
    .step-select-wrapper {
      position: relative;
      flex-shrink: 0;
    }

    .step-trigger {
      min-width: 76px;
      height: 40px;
      padding: 0 12px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xs);
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 400;
      color: var(--gray-400);
      transition: var(--transition);
      gap: 6px;
    }

    .step-trigger:hover {
      border-color: var(--blue);
      background: #F8FBFF;
    }

    .step-trigger.has-value {
      color: var(--gray-500);
      border-color: var(--blue);
      background: #E6F4FF;
      font-weight: 400;
    }

    .step-trigger .step-arrow {
      font-size: 14px;
      color: var(--gray-300);
      transition: var(--transition);
    }

    .step-trigger.has-value .step-arrow {
      color: var(--blue);
    }

    .step-trigger.disabled {
      cursor: default;
      opacity: 1;
    }

    /* 答题后的步骤显示 */
    .step-result {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .step-result.correct {
      background: var(--correct);
      color: var(--white);
    }

    .step-result.incorrect {
      background: var(--incorrect);
      color: var(--white);
    }

    /* 下拉面板 */
    .step-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      min-width: 76px;
      background: var(--white);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xs);
      z-index: 100;
      overflow: hidden;
      animation: dropIn 0.12s ease;
    }

    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .step-dropdown-item {
      padding: 10px 12px;
      text-align: center;
      font-family: inherit;
      font-size: 14px;
      font-weight: 400;
      color: var(--gray-500);
      cursor: pointer;
      transition: all 0.12s ease;
    }

    .step-dropdown-item:hover {
      background: #E6F4FF;
      color: var(--blue);
    }

    .step-dropdown-item + .step-dropdown-item {
      border-top: 1px solid var(--gray-50);
    }

    /* 遮罩 */
    .step-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 99;
    }

    /* 提交按钮 */
    .action-bar {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .action-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }

    .btn-primary {
      background: #7C3AED;
      color: var(--white);
    }

    .btn-primary:hover {
      filter: brightness(1.1);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-reset {
      background: var(--gray-100);
      color: var(--gray-500);
      flex: 0 0 auto;
      padding: 14px 20px;
    }

    .btn-reset:hover {
      background: var(--gray-200);
    }

    /* 答题反馈 */
    .feedback {
      margin-top: 16px;
      padding: 16px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.5;
      display: none;
    }

    .feedback.show { display: block; }

    .feedback.correct-fb {
      background: #E6FFE6;
      color: var(--green-dark);
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    .feedback.incorrect-fb {
      background: #FFE6E6;
      color: var(--red);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .feedback-icon {
      font-size: 18px;
      margin-right: 6px;
    }

    .correct-order-info {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(239, 68, 68, 0.15);
      font-weight: 600;
      color: var(--gray-500);
    }

    .correct-order-info span {
      display: block;
      margin-top: 4px;
      font-weight: 400;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="preview-container">
    <div class="preview-title">排序题 · 下拉选步骤模式</div>

    <div class="question-card">
      <div class="question-type-badge">排序题</div>
      <h3>请按正确顺序排列"用 AI 字段审查合同"的步骤：</h3>

      <div class="order-hint" id="orderHint">💡 为每个选项选择对应的步骤编号</div>

      <div class="order-list" id="orderList"></div>

      <div class="action-bar" id="actionBar">
        <button class="action-btn btn-primary" id="submitBtn" onclick="checkAnswer()" disabled>检查答案</button>
      </div>

      <div class="feedback" id="feedback"></div>
    </div>
  </div>

  <script>
    // 题目数据
    const question = {
      items: ['上传合同到附件字段', '创建 AI 字段并引用附件', '编写审查提示词', 'AI 输出结构化报告'],
      correctOrder: [0, 1, 2, 3]
    };

    // 状态：每个选项被分配的步骤号（null 表示未选）
    let assignments = [];  // assignments[i] = 用户给第 i 个选项分配的步骤号（1-based），null 表示未选
    let answered = false;
    let openDropdown = null; // 当前打开的下拉框索引

    // 初始化
    function initOrder() {
      assignments = new Array(question.items.length).fill(null);
      answered = false;
      openDropdown = null;
      document.getElementById('feedback').className = 'feedback';
      renderOrder();
    }

    // 获取所有步骤号（始终全部显示，允许抢占）
    function getAllSteps() {
      const steps = [];
      for (let s = 1; s <= question.items.length; s++) {
        steps.push(s);
      }
      return steps;
    }

    // 获取按步骤号排序后的索引顺序
    function getSortedIndices() {
      const indices = question.items.map((_, i) => i);
      // 已分配步骤的按步骤号排前面，未分配的按原始顺序排后面
      indices.sort((a, b) => {
        const stepA = assignments[a];
        const stepB = assignments[b];
        if (stepA !== null && stepB !== null) return stepA - stepB;
        if (stepA !== null) return -1;
        if (stepB !== null) return 1;
        return a - b;
      });
      return indices;
    }

    // 渲染
    function renderOrder() {
      const listEl = document.getElementById('orderList');
      const actionBar = document.getElementById('actionBar');
      const submitBtn = document.getElementById('submitBtn');
      const hintEl = document.getElementById('orderHint');

      const displayOrder = getSortedIndices();

      let html = '';
      for (const i of displayOrder) {
        const text = question.items[i];
        const assignedStep = assignments[i];

        let itemClass = '';
        let rightContent = '';

        if (answered) {
          // 答题后：显示结果
          const userStep = assignedStep;
          const correctStep = question.correctOrder[i] + 1;
          const isCorrect = userStep === correctStep;
          itemClass = isCorrect ? 'correct' : 'incorrect';
          rightContent = `<div class="step-result ${isCorrect ? 'correct' : 'incorrect'}">${userStep}</div>`;
        } else {
          // 答题前：显示下拉选择器
          if (assignedStep !== null) itemClass = 'assigned';
          rightContent = `
            <div class="step-select-wrapper" id="step-wrapper-${i}">
              <div class="step-trigger ${assignedStep !== null ? 'has-value' : ''}" onclick="toggleDropdown(${i})">
                <span>${assignedStep !== null ? '第' + assignedStep + '步' : '选择'}</span>
                <span class="step-arrow">▾</span>
              </div>
            </div>`;
        }

        html += `
          <div class="order-item ${itemClass}">
            <span class="order-text">${text}</span>
            ${rightContent}
          </div>`;
      }
      listEl.innerHTML = html;

      // 更新按钮状态
      if (answered) {
        hintEl.style.display = 'none';
        actionBar.style.display = 'none';
      } else {
        const allAssigned = assignments.every(v => v !== null);
        submitBtn.disabled = !allAssigned;
        actionBar.style.display = 'flex';
        hintEl.style.display = 'block';
      }
    }

    // 打开/关闭下拉
    function toggleDropdown(index) {
      if (answered) return;
      if (openDropdown === index) {
        closeDropdown();
        return;
      }
      openDropdown = index;
      showDropdown(index);
    }

    function showDropdown(index) {
      // 先关闭已有的
      closeDropdown(true);

      const wrapper = document.getElementById('step-wrapper-' + index);
      if (!wrapper) return;

      const available = getAllSteps();

      // 创建遮罩
      const overlay = document.createElement('div');
      overlay.className = 'step-overlay';
      overlay.onclick = function() { closeDropdown(); };
      document.body.appendChild(overlay);

      // 创建下拉
      const dropdown = document.createElement('div');
      dropdown.className = 'step-dropdown';
      dropdown.id = 'active-dropdown';

      available.forEach(step => {
        const item = document.createElement('div');
        item.className = 'step-dropdown-item';
        item.textContent = '第' + step + '步';
        item.onclick = function(e) {
          e.stopPropagation();
          selectStep(index, step);
        };
        dropdown.appendChild(item);
      });

      wrapper.appendChild(dropdown);
    }

    function closeDropdown(skipRender) {
      openDropdown = null;
      const overlay = document.querySelector('.step-overlay');
      if (overlay) overlay.remove();
      const dropdown = document.getElementById('active-dropdown');
      if (dropdown) dropdown.remove();
    }

    // 选择步骤（后来的抢掉原来的，最新选择最高优先级）
    function selectStep(itemIndex, step) {
      // 如果这个步骤已经被其他选项占用，先清除原来的
      const existingIndex = assignments.indexOf(step);
      if (existingIndex !== -1 && existingIndex !== itemIndex) {
        assignments[existingIndex] = null;
      }
      assignments[itemIndex] = step;
      closeDropdown();
      renderOrder();
    }

    // 重置
    function resetOrder() {
      closeDropdown();
      initOrder();
    }

    // 提交答案
    function checkAnswer() {
      if (assignments.some(v => v === null)) return;
      answered = true;
      closeDropdown();

      // 判断是否全部正确
      const isCorrect = question.items.every((_, i) => {
        return assignments[i] === question.correctOrder[i] + 1;
      });

      renderOrder();

      const feedbackEl = document.getElementById('feedback');
      if (isCorrect) {
        feedbackEl.className = 'feedback correct-fb show';
        feedbackEl.innerHTML = '<span class="feedback-icon">🎉</span> 完全正确！顺序无误。';
      } else {
        const correctText = question.correctOrder
          .map((origIdx, i) => `第${i + 1}步：${question.items[origIdx]}`)
          .join('<br>');
        feedbackEl.className = 'feedback incorrect-fb show';
        feedbackEl.innerHTML = `
          <span class="feedback-icon">😅</span> 顺序不太对，再想想看～
          <div class="correct-order-info">
            正确顺序：
            <span>${correctText}</span>
          </div>`;
      }
    }

    // 启动
    initOrder();
  </script>
</body>
</html>
